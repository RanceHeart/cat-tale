<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>猫猫物语</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --ui: #2c3e50;
      --accent: #ff6b6b;
      --panel: rgba(255, 255, 255, 0.82);
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #6fb6d9;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ui);
    }

    #game-wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #touch-controls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 10;
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 18px;
      pointer-events: none;
    }

    .touch-cluster {
      display: flex;
      gap: 12px;
      pointer-events: auto;
    }

    .touch-btn {
      width: 18vmin;
      height: 14vmin;
      max-width: 90px;
      max-height: 70px;
      border: 3px solid rgba(44, 62, 80, 0.42);
      border-radius: 2vmin;
      background: var(--panel);
      color: var(--ui);
      font-size: 5vmin;
      font-weight: 900;
      box-shadow: 0 5px 0 rgba(44, 62, 80, 0.22);
      touch-action: none;
      user-select: none;
    }

    .touch-btn.jump {
      width: 24vmin;
      height: 17vmin;
      max-width: 120px;
      max-height: 85px;
      color: #ffffff;
      background: var(--accent);
      border-color: rgba(122, 35, 35, 0.42);
    }

    @media (hover: none), (pointer: coarse) {
      #touch-controls {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="game-wrap"></div>
  <div id="touch-controls" aria-hidden="true">
    <div class="touch-cluster">
      <button class="touch-btn" data-touch="left">←</button>
      <button class="touch-btn" data-touch="right">→</button>
    </div>
    <div class="touch-cluster">
      <button class="touch-btn jump" data-touch="jump">跳</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script>
    const GRAVITY = 1200;
    const PLAYER_SPEED = 200;
    const PLAYER_ACCELERATION = 1800;
    const PLAYER_DRAG = 1200;
    const JUMP_VELOCITY = -460;
    const JUMP_HOLD_FORCE = -80;
    const JUMP_HOLD_MAX_TIME = 0.32;
    const JUMP_BUFFER_TIME = 0.12;
    const COYOTE_TIME = 0.08;
    const TILE = 40;
    const GAME_WIDTH = 800;
    const GAME_HEIGHT = 480;
    const IS_TOUCH = ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);

    const state = {
      level: 0,
      lives: 3,
      score: 0,
      musicStarted: false,
      music: null
    };

    const touchState = {
      left: false,
      right: false,
      jump: false,
      jumpPressed: false
    };

    const LEVELS = [
      {
        name: "花园",
        theme: "garden",
        skyTop: "#87CEEB",
        skyBottom: "#B7E6FF",
        ground: "#7EC850",
        earth: "#8B5E3C",
        map: [
          "   c                         c                         c                         ",
          "                                                                                 ",
          "        %                %                %           F                          ",
          "                                                       c                         ",
          "  @                                                                     t        ",
          "   B====B   B====B        B==B    B====B     B====B    B======B         g        ",
          "       g       %                    %                              %             ",
          "=====    ===========    ========    ==========  ==============       =====       ",
          "    g                               ^                           ^                ",
          "=====  ========================================================   ==============="
        ]
      },
      {
        name: "屋顶",
        theme: "rooftop",
        skyTop: "#6AB0D8",
        skyBottom: "#D3F1FF",
        ground: "#8AA1B1",
        earth: "#5D6975",
        map: [
          "      c                          c                         c                                      ",
          "                                                                                                  ",
          "      %                %                 %             c                       %            F      ",
          "                                          B==B                                            B==B     ",
          "  @          ^              B==B          %             D                         ^        g       ",
          "   B======B   B======B                   B==B       B==========B       B====B       B======B       ",
          "                         B==B                         g                  M                         ",
          "==========       ==========        ==============       ===      ====         ===========           ",
          "                  %        D            ^                                           %             ",
          "==========   ==============   ===================   ==================   ===================  ===="
        ]
      },
      {
        name: "皇宫",
        theme: "palace",
        skyTop: "#B8A1E3",
        skyBottom: "#F3D6FF",
        ground: "#C8A87C",
        earth: "#6F4E37",
        map: [
          "      c                         c                         c                                       ",
          "                                                                                                  ",
          "      %               %                  %                 %                   %            F      ",
          "                                                                                       B====B     ",
          "  @                 ^                         D                %        C              g           ",
          "   B======B    B=========B      B=====B    B==========B        B====================B              ",
          "                              %                 S                  S                               ",
          "==========   ====     ====   ====   ====        =======   ====      ====      ======              ",
          "             SSSS            SSSS   SSSS                  SSSS      SSSS                         ",
          "==========   ====   ==============   ==================   ===============================   ======="
        ]
      }
    ];

    function setupTouchControls() {
      document.querySelectorAll("[data-touch]").forEach((button) => {
        const key = button.dataset.touch;
        const setValue = (value) => {
          if (key === "jump" && value && !touchState.jump) {
            touchState.jumpPressed = true;
          }
          touchState[key] = value;
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          button.setPointerCapture(event.pointerId);
          setValue(true);
        });
        button.addEventListener("pointerup", (event) => {
          event.preventDefault();
          setValue(false);
        });
        button.addEventListener("pointercancel", () => setValue(false));
        button.addEventListener("lostpointercapture", () => setValue(false));
        button.addEventListener("touchstart", (event) => {
          event.preventDefault();
          setValue(true);
        }, { passive: false });
        button.addEventListener("touchend", (event) => {
          event.preventDefault();
          setValue(false);
        }, { passive: false });
      });
    }

    function makeCanvas(width, height) {
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;
      return { canvas, ctx };
    }

    function px(ctx, x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawCatFrame(ctx, ox, frame) {
      const fur = "#FF8C42";
      const stripe = "#E0672A";
      const belly = "#FFF3E0";
      const dark = "#3A2517";
      const pink = "#F58CA8";
      const idleBob = frame === 1 ? 1 : 0;
      const runA = frame === 2;
      const runB = frame === 3;
      const jump = frame === 4;
      const fall = frame === 5;
      const bodyY = 13 + idleBob + (jump ? -1 : 0);
      const headY = 4 + idleBob + (fall ? 1 : 0);
      const tailY = bodyY + (jump ? -5 : fall ? 7 : runA ? 1 : runB ? -2 : frame === 1 ? 2 : 0);

      px(ctx, ox + 4, tailY + 6, 4, 4, fur);
      px(ctx, ox + 1, tailY + 4, 4, 4, fur);
      px(ctx, ox + 0, tailY + 1, 4, 4, fur);
      px(ctx, ox + 2, tailY - 2, 4, 3, fur);
      px(ctx, ox + 3, tailY + 4, 2, 2, stripe);

      px(ctx, ox + 9, bodyY, 15, 13, fur);
      px(ctx, ox + 12, bodyY + 3, 8, 8, belly);
      px(ctx, ox + 10, bodyY + 2, 3, 2, stripe);
      px(ctx, ox + 20, bodyY + 2, 3, 2, stripe);
      px(ctx, ox + 11, bodyY + 5, 2, 2, stripe);
      px(ctx, ox + 7, headY + 3, 18, 14, fur);
      px(ctx, ox + 9, headY, 5, 5, fur);
      px(ctx, ox + 19, headY, 5, 5, fur);
      px(ctx, ox + 10, headY + 1, 2, 2, belly);
      px(ctx, ox + 21, headY + 1, 2, 2, belly);
      px(ctx, ox + 10, headY + 7, 3, 3, "#ffffff");
      px(ctx, ox + 20, headY + 7, 3, 3, "#ffffff");
      px(ctx, ox + 11, headY + 8, 1, 2, dark);
      px(ctx, ox + 21, headY + 8, 1, 2, dark);
      px(ctx, ox + 15, headY + 10, 3, 2, pink);
      px(ctx, ox + 14, headY + 12, 5, 1, dark);
      px(ctx, ox + 6, headY + 10, 5, 1, dark);
      px(ctx, ox + 22, headY + 10, 5, 1, dark);
      px(ctx, ox + 6, headY + 13, 5, 1, dark);
      px(ctx, ox + 22, headY + 13, 5, 1, dark);
      px(ctx, ox + 13, headY + 4, 2, 2, stripe);
      px(ctx, ox + 17, headY + 4, 2, 2, stripe);

      if (jump) {
        px(ctx, ox + 8, bodyY + 12, 5, 3, fur);
        px(ctx, ox + 20, bodyY + 11, 5, 3, fur);
      } else if (fall) {
        px(ctx, ox + 6, bodyY + 12, 5, 3, fur);
        px(ctx, ox + 22, bodyY + 12, 5, 3, fur);
      } else {
        px(ctx, ox + 10, bodyY + 12, 4, runA ? 5 : 3, fur);
        px(ctx, ox + 20, bodyY + 12, 4, runB ? 5 : 3, fur);
        px(ctx, ox + 9, bodyY + 16, 6, 2, fur);
        px(ctx, ox + 19, bodyY + 16, 6, 2, fur);
      }
    }

    function generateCatSpritesheet() {
      const { canvas, ctx } = makeCanvas(32 * 6, 32);
      for (let frame = 0; frame < 6; frame += 1) {
        drawCatFrame(ctx, frame * 32, frame);
      }
      return canvas;
    }

    function generateEnemySpritesheet(type) {
      const sizes = {
        crow: [32, 24, "#8B5CF6"],
        dog: [40, 28, "#8B4513"],
        croc: [56, 32, "#2E8B57"]
      };
      const [width, height, color] = sizes[type];
      const { canvas, ctx } = makeCanvas(width * 2, height);
      for (let i = 0; i < 2; i += 1) {
        const ox = i * width;
        if (type === "crow") {
          px(ctx, ox + 7, 8 + i, 16, 9, color);
          px(ctx, ox + 20, 6, 7, 7, color);
          px(ctx, ox + 26, 9, 4, 2, "#FFD166");
          px(ctx, ox + 11, 5 - i, 7, 5, "#6D28D9");
          px(ctx, ox + 11, 17 + i, 7, 4, "#6D28D9");
          px(ctx, ox + 23, 8, 2, 2, "#111111");
        } else if (type === "dog") {
          px(ctx, ox + 8, 10, 21, 11, color);
          px(ctx, ox + 25, 6, 10, 10, color);
          px(ctx, ox + 28, 3, 4, 5, "#5A2D0C");
          px(ctx, ox + 34, 10, 4, 3, "#111111");
          px(ctx, ox + 11, 20, 5, i ? 6 : 4, color);
          px(ctx, ox + 24, 20, 5, i ? 4 : 6, color);
          px(ctx, ox + 4, 11, 6, 4, color);
        } else {
          px(ctx, ox + 5, 12, 42, 12, color);
          px(ctx, ox + 38, 7, 13, 11, color);
          px(ctx, ox + 46, 13, 8, 4, "#B7F7C8");
          px(ctx, ox + 41, 9, 2, 2, "#111111");
          px(ctx, ox + 11, 10, 5, 3, "#1C6B44");
          px(ctx, ox + 22, 10, 5, 3, "#1C6B44");
          px(ctx, ox + 9, 24, 7, i ? 5 : 3, color);
          px(ctx, ox + 31, 24, 7, i ? 3 : 5, color);
        }
      }
      return canvas;
    }

    function generateTileTexture(color, earth) {
      const { canvas, ctx } = makeCanvas(TILE, TILE);
      px(ctx, 0, 0, TILE, TILE, earth);
      px(ctx, 0, 0, TILE, 10, color);
      px(ctx, 4, 15, 12, 3, "rgba(255,255,255,0.12)");
      px(ctx, 23, 25, 10, 3, "rgba(0,0,0,0.12)");
      return canvas;
    }

    function generateBrickTexture() {
      const { canvas, ctx } = makeCanvas(TILE, TILE);
      px(ctx, 0, 0, TILE, TILE, "#C8A87C");
      px(ctx, 0, 18, TILE, 3, "#9D7A53");
      px(ctx, 18, 0, 3, 18, "#9D7A53");
      px(ctx, 6, 26, 3, 14, "#9D7A53");
      px(ctx, 0, 0, TILE, 3, "rgba(255,255,255,0.2)");
      return canvas;
    }

    function generateFishTexture() {
      const { canvas, ctx } = makeCanvas(24, 18);
      px(ctx, 5, 5, 12, 8, "#FFD700");
      px(ctx, 16, 3, 6, 6, "#FFD700");
      px(ctx, 16, 9, 6, 6, "#FFD700");
      px(ctx, 7, 7, 2, 2, "#ffffff");
      px(ctx, 8, 8, 1, 1, "#111111");
      px(ctx, 2, 8, 4, 3, "#FFA500");
      return canvas;
    }

    function generateFlagTexture() {
      const { canvas, ctx } = makeCanvas(36, 96);
      px(ctx, 6, 6, 4, 86, "#6B4F33");
      px(ctx, 10, 10, 22, 16, "#FF6B6B");
      px(ctx, 14, 14, 8, 4, "#FFF3E0");
      px(ctx, 2, 90, 18, 4, "#6B4F33");
      return canvas;
    }

    function generateGrassDeco() {
      const { canvas, ctx } = makeCanvas(TILE, TILE);
      px(ctx, 4, 26, 6, 8, "#3FA34D");
      px(ctx, 11, 22, 5, 12, "#58C96B");
      px(ctx, 17, 27, 7, 7, "#2F8F45");
      px(ctx, 26, 23, 5, 11, "#58C96B");
      px(ctx, 31, 28, 5, 6, "#3FA34D");
      px(ctx, 9, 20, 3, 3, "#FFE66D");
      px(ctx, 23, 22, 3, 3, "#FF8FAB");
      px(ctx, 33, 25, 3, 3, "#FFFFFF");
      return canvas;
    }

    function generateTreeTexture() {
      const { canvas, ctx } = makeCanvas(54, 76);
      px(ctx, 23, 36, 9, 35, "#7A4E2A");
      px(ctx, 15, 49, 25, 8, "#8B5E3C");
      px(ctx, 12, 18, 30, 28, "#2F9E44");
      px(ctx, 5, 30, 22, 22, "#45B85A");
      px(ctx, 28, 29, 22, 23, "#3AA64D");
      px(ctx, 17, 8, 22, 22, "#58C96B");
      px(ctx, 24, 44, 7, 7, "#2A7F3A");
      return canvas;
    }

    function generateCloudTexture() {
      const { canvas, ctx } = makeCanvas(70, 34);
      px(ctx, 8, 17, 52, 11, "rgba(255,255,255,0.88)");
      px(ctx, 18, 9, 22, 16, "rgba(255,255,255,0.9)");
      px(ctx, 36, 13, 24, 13, "rgba(255,255,255,0.82)");
      px(ctx, 4, 22, 62, 8, "rgba(255,255,255,0.76)");
      return canvas;
    }

    function generateDustTexture() {
      const { canvas, ctx } = makeCanvas(8, 8);
      px(ctx, 1, 2, 6, 4, "#A87545");
      px(ctx, 2, 1, 3, 6, "#C3915F");
      return canvas;
    }

    function generateSparkTexture() {
      const { canvas, ctx } = makeCanvas(8, 8);
      px(ctx, 3, 0, 2, 8, "#FFD700");
      px(ctx, 0, 3, 8, 2, "#FFD700");
      px(ctx, 2, 2, 4, 4, "#FFF3A3");
      return canvas;
    }

    function generateSpikeTexture() {
      const { canvas, ctx } = makeCanvas(TILE, TILE);
      ctx.fillStyle = "#E74C3C";
      for (let i = 0; i < 4; i += 1) {
        ctx.beginPath();
        ctx.moveTo(i * 10, TILE);
        ctx.lineTo(i * 10 + 5, 8);
        ctx.lineTo(i * 10 + 10, TILE);
        ctx.closePath();
        ctx.fill();
      }
      return canvas;
    }

    function generatePlatformTexture() {
      const { canvas, ctx } = makeCanvas(TILE, 14);
      px(ctx, 0, 0, TILE, 14, "#6F8194");
      px(ctx, 0, 0, TILE, 4, "#D3E2F0");
      px(ctx, 4, 8, 32, 2, "#4D5D6C");
      return canvas;
    }

    class BootScene extends Phaser.Scene {
      constructor() {
        super("BootScene");
      }

      create() {
        this.textures.addSpriteSheet("cat", generateCatSpritesheet(), { frameWidth: 32, frameHeight: 32 });
        this.textures.addSpriteSheet("crow", generateEnemySpritesheet("crow"), { frameWidth: 32, frameHeight: 24 });
        this.textures.addSpriteSheet("dog", generateEnemySpritesheet("dog"), { frameWidth: 40, frameHeight: 28 });
        this.textures.addSpriteSheet("croc", generateEnemySpritesheet("croc"), { frameWidth: 56, frameHeight: 32 });
        this.textures.addCanvas("brick", generateBrickTexture());
        this.textures.addCanvas("fish", generateFishTexture());
        this.textures.addCanvas("flag", generateFlagTexture());
        this.textures.addCanvas("spike", generateSpikeTexture());
        this.textures.addCanvas("movingPlatform", generatePlatformTexture());
        this.textures.addCanvas("grass_deco", generateGrassDeco());
        this.textures.addCanvas("tree", generateTreeTexture());
        this.textures.addCanvas("cloud", generateCloudTexture());
        this.textures.addCanvas("dust", generateDustTexture());
        this.textures.addCanvas("spark", generateSparkTexture());
        LEVELS.forEach((level, index) => {
          this.textures.addCanvas(`ground${index}`, generateTileTexture(level.ground, level.earth));
        });

        this.anims.create({ key: "cat-idle", frames: this.anims.generateFrameNumbers("cat", { start: 0, end: 1 }), frameRate: 3, repeat: -1 });
        this.anims.create({ key: "cat-run", frames: this.anims.generateFrameNumbers("cat", { start: 2, end: 3 }), frameRate: 10, repeat: -1 });
        this.anims.create({ key: "cat-jump", frames: [{ key: "cat", frame: 4 }], frameRate: 1 });
        this.anims.create({ key: "cat-fall", frames: [{ key: "cat", frame: 5 }], frameRate: 1 });
        ["crow", "dog", "croc"].forEach((key) => {
          this.anims.create({ key: `${key}-move`, frames: this.anims.generateFrameNumbers(key, { start: 0, end: 1 }), frameRate: 5, repeat: -1 });
        });

        this.scene.start("TitleScene");
      }
    }

    class TitleScene extends Phaser.Scene {
      constructor() {
        super("TitleScene");
      }

      create() {
        drawSky(this, "#87CEEB", "#B7E6FF", GAME_WIDTH, GAME_HEIGHT);
        this.add.text(400, 132, "猫猫物语", {
          fontSize: "64px",
          fontStyle: "900",
          color: "#2C3E50",
          stroke: "#FFF3E0",
          strokeThickness: 8
        }).setOrigin(0.5);
        this.add.sprite(400, 238, "cat", 0).setScale(3).play("cat-idle");
        const promptText = IS_TOUCH ? "点击屏幕开始" : "按 SPACE 开始";
        const prompt = this.add.text(400, 344, promptText, {
          fontSize: "26px",
          fontStyle: "800",
          color: "#2C3E50"
        }).setOrigin(0.5);
        this.add.text(400, 448, "Music: Hep Cats / Electro Cabello - Kevin MacLeod (incompetech.com), CC BY 4.0", {
          fontSize: "13px",
          color: "#2C3E50"
        }).setOrigin(0.5);
        this.tweens.add({ targets: prompt, alpha: 0.35, yoyo: true, repeat: -1, duration: 620 });
        this.input.keyboard.once("keydown-SPACE", () => this.startGame());
        this.input.once("pointerdown", () => this.startGame());
      }

      startGame() {
        startMusic(this);
        state.level = 0;
        state.lives = 3;
        state.score = 0;
        this.scene.start("GameScene");
      }
    }

    class GameScene extends Phaser.Scene {
      constructor() {
        super("GameScene");
      }

      create() {
        this.level = LEVELS[state.level];
        this.mapWidth = Math.max(...this.level.map.map((row) => row.length)) * TILE;
        this.mapHeight = this.level.map.length * TILE;
        this.jumpBuffer = 0;
        this.coyoteTimer = 0;
        this.jumpHoldTimer = 0;
        this.wasJumpDown = false;
        this.wasOnGround = false;
        this.respawning = false;
        this.invincible = false;
        this.jumpSquashing = false;
        this.skidDustTimer = 0;
        this.cameraZoomTarget = 1;

        drawSky(this, this.level.skyTop, this.level.skyBottom, this.mapWidth, GAME_HEIGHT);
        drawBackgroundLayers(this, this.level.theme, this.mapWidth, GAME_HEIGHT);
        this.physics.world.setBounds(0, 0, this.mapWidth, this.mapHeight + 220);
        this.cameras.main.setBounds(0, 0, this.mapWidth, GAME_HEIGHT);

        this.platforms = this.physics.add.staticGroup();
        this.decorations = this.add.group();
        this.enemies = this.physics.add.group();
        this.fishes = this.physics.add.staticGroup();
        this.spikes = this.physics.add.staticGroup();
        this.movingPlatforms = this.physics.add.group({ allowGravity: false, immovable: true });
        this.flags = this.physics.add.staticGroup();

        this.spawn = { x: 80, y: 260 };
        this.buildLevel();
        this.createPlayer();
        this.createHud();
        this.createFlagHint();

        this.physics.add.collider(this.player, this.platforms);
        this.physics.add.collider(this.player, this.movingPlatforms, (player, platform) => {
          if (player.body.touching.down && platform.body.touching.up) {
            player.x += platform.body.deltaX();
          }
        });
        this.physics.add.collider(this.enemies, this.platforms);
        this.physics.add.collider(this.enemies, this.movingPlatforms);
        this.physics.add.overlap(this.player, this.fishes, this.collectFish, null, this);
        this.physics.add.overlap(this.player, this.enemies, this.hitEnemy, null, this);
        this.physics.add.overlap(this.player, this.spikes, () => this.killPlayer(), null, this);
        this.physics.add.overlap(this.player, this.flags, () => this.finishLevel(), null, this);

        this.cameras.main.startFollow(this.player, true, 0.12, 0.12, 0, 70);
        this.showLevelName();
        this.keys = this.input.keyboard.addKeys({
          left: "LEFT",
          right: "RIGHT",
          up: "UP",
          a: "A",
          d: "D",
          w: "W",
          space: "SPACE"
        });
      }

      buildLevel() {
        this.level.map.forEach((row, y) => {
          [...row].forEach((tile, x) => {
            const cx = x * TILE + TILE / 2;
            const cy = y * TILE + TILE / 2;
            if (tile === "=") {
              this.platforms.create(cx, cy, `ground${state.level}`).setOrigin(0.5).refreshBody();
            } else if (tile === "B") {
              this.platforms.create(cx, cy, "brick").setOrigin(0.5).refreshBody();
            } else if (tile === "@") {
              this.spawn = { x: cx, y: cy - 18 };
            } else if (tile === "%") {
              const fish = this.fishes.create(cx, cy, "fish");
              fish.setData("baseY", cy);
              fish.setData("phase", Phaser.Math.FloatBetween(0, Math.PI * 2));
            } else if (tile === "^") {
              this.createEnemy("crow", cx, cy + 8, 72, 1);
            } else if (tile === "D") {
              this.createEnemy("dog", cx, cy + 8, 108, 1);
            } else if (tile === "C") {
              this.createEnemy("croc", cx, cy + 5, 78, 3);
            } else if (tile === "F") {
              const flag = this.flags.create(cx, cy - 28, "flag");
              flag.body.setSize(36, 96).setOffset(0, 0);
              flag.setData("baseX", flag.x);
              flag.setData("baseY", flag.y);
              this.tweens.add({ targets: flag, x: flag.x + 4, scaleX: 1.06, yoyo: true, repeat: -1, duration: 600, ease: "Sine.easeInOut" });
            } else if (tile === "S") {
              const spike = this.spikes.create(cx, cy, "spike");
              spike.body.setSize(32, 28).setOffset(4, 12);
            } else if (tile === "M") {
              const platform = this.movingPlatforms.create(cx, cy + 8, "movingPlatform");
              platform.body.setSize(TILE, 14);
              platform.setData("startX", cx);
              platform.setData("range", 110);
              platform.setData("speed", 70);
              platform.setVelocityX(70);
            } else if (tile === "g") {
              this.decorations.add(this.add.image(cx, cy, "grass_deco").setDepth(2));
            } else if (tile === "t") {
              this.decorations.add(this.add.image(cx, cy - 18, "tree").setDepth(1));
            } else if (tile === "c") {
              const cloud = this.add.image(cx, cy, "cloud").setDepth(1).setAlpha(0.88);
              cloud.setData("baseX", cx);
              cloud.setData("phase", Phaser.Math.FloatBetween(0, Math.PI * 2));
              this.decorations.add(cloud);
            }
          });
        });
      }

      createEnemy(type, x, y, speed, health) {
        const enemy = this.enemies.create(x, y, type);
        enemy.play(`${type}-move`);
        enemy.setCollideWorldBounds(true);
        enemy.setBounce(0);
        enemy.setVelocityX(speed);
        enemy.setData("speed", speed);
        enemy.setData("health", health);
        enemy.setData("type", type);
        if (type === "crow") {
          enemy.body.setSize(25, 17).setOffset(4, 6);
        } else if (type === "dog") {
          enemy.body.setSize(32, 20).setOffset(4, 7);
        } else {
          enemy.body.setSize(48, 22).setOffset(4, 8);
        }
      }

      createPlayer() {
        this.player = this.physics.add.sprite(this.spawn.x, this.spawn.y, "cat");
        this.player.setCollideWorldBounds(false);
        this.player.setMaxVelocity(PLAYER_SPEED, 900);
        this.player.setDragX(PLAYER_DRAG);
        this.player.body.setSize(20, 26).setOffset(6, 5);
        this.player.play("cat-idle");
      }

      createHud() {
        const hudFontSize = `${Math.round(GAME_WIDTH * 0.031)}px`;
        this.hud = this.add.container(0, 0).setScrollFactor(0).setDepth(50);
        this.lifeText = this.add.text(18, 14, "", { fontSize: hudFontSize, fontStyle: "900", color: "#E74C3C", stroke: "#ffffff", strokeThickness: 4 });
        this.face = this.add.sprite(128, 27, "cat", 0).setScale(1.15);
        this.scoreText = this.add.text(660, 14, "", { fontSize: hudFontSize, fontStyle: "900", color: "#2C3E50", stroke: "#ffffff", strokeThickness: 4 });
        this.hud.add([this.lifeText, this.face, this.scoreText]);
        this.updateHud();
      }

      showLevelName() {
        const label = this.add.text(400, 92, this.level.name, {
          fontSize: "42px",
          fontStyle: "900",
          color: "#2C3E50",
          stroke: "#ffffff",
          strokeThickness: 7
        }).setOrigin(0.5).setScrollFactor(0).setDepth(60);
        this.tweens.add({ targets: label, alpha: 0, y: 70, delay: 1550, duration: 450, onComplete: () => label.destroy() });
      }

      createFlagHint() {
        const flag = this.flags.getChildren()[0];
        if (!flag) return;
        this.flagHint = this.add.text(flag.x, flag.y - 74, "▼", {
          fontSize: "26px",
          fontStyle: "900",
          color: "#FF6B6B",
          stroke: "#FFFFFF",
          strokeThickness: 5
        }).setOrigin(0.5).setDepth(20).setAlpha(0);
        this.tweens.add({ targets: this.flagHint, y: this.flagHint.y - 8, yoyo: true, repeat: -1, duration: 360, ease: "Sine.easeInOut" });
      }

      updateHud() {
        this.lifeText.setText("❤".repeat(state.lives));
        this.scoreText.setText(`🐟 × ${state.score}`);
      }

      updateFlagHint() {
        if (!this.flagHint) return;
        const flag = this.flags.getChildren()[0];
        if (!flag) return;
        this.flagHint.x = flag.x;
        const distance = Phaser.Math.Distance.Between(this.player.x, this.player.y, flag.x, flag.y);
        this.flagHint.setAlpha(distance < 260 ? 1 : 0);
      }

      updateDecorations(time) {
        this.decorations.children.iterate((deco) => {
          if (!deco || !deco.active || deco.texture.key !== "cloud") return;
          deco.x = deco.getData("baseX") + Math.sin(time / 1600 + deco.getData("phase")) * 10;
        });
      }

      updateCameraDynamics() {
        this.cameraZoomTarget = Math.abs(this.player.body.velocity.x) > PLAYER_SPEED * 0.72 ? 1.02 : 1;
        this.cameras.main.setZoom(Phaser.Math.Linear(this.cameras.main.zoom, this.cameraZoomTarget, 0.08));
      }

      startJumpAnticipation() {
        if (this.jumpSquashing) return;
        this.jumpSquashing = true;
        this.jumpBuffer = 0;
        this.coyoteTimer = 0;
        this.player.setAccelerationX(0);
        this.tweens.add({
          targets: this.player,
          scaleX: 1.12,
          scaleY: 0.85,
          duration: 60,
          ease: "Quad.easeOut",
          onComplete: () => {
            if (!this.player || !this.player.active || this.respawning) return;
            this.player.setScale(0.9, 1.12);
            this.player.setVelocityY(JUMP_VELOCITY);
            this.jumpHoldTimer = JUMP_HOLD_MAX_TIME;
            playSfx("jump");
            this.emitDust(this.player.x, this.player.y + 14, 6, this.player.flipX ? 1 : -1);
            this.tweens.add({
              targets: this.player,
              scaleX: 1,
              scaleY: 1,
              duration: 85,
              ease: "Back.easeOut",
              onComplete: () => {
                this.jumpSquashing = false;
              }
            });
          }
        });
      }

      emitDust(x, y, count, direction) {
        for (let i = 0; i < count; i += 1) {
          const dust = this.add.image(x, y, "dust").setDepth(18).setScale(Phaser.Math.FloatBetween(0.7, 1.2));
          const spread = Phaser.Math.Between(18, 42) * (i % 2 === 0 ? -1 : 1);
          const push = direction ? direction * Phaser.Math.Between(8, 22) : 0;
          this.tweens.add({
            targets: dust,
            x: dust.x + spread + push,
            y: dust.y - Phaser.Math.Between(4, 18),
            alpha: 0,
            scaleX: 0.25,
            scaleY: 0.25,
            duration: 400,
            ease: "Quad.easeOut",
            onComplete: () => dust.destroy()
          });
        }
      }

      update(time, deltaMs) {
        const dt = deltaMs / 1000;
        if (!this.player || this.respawning) {
          return;
        }
        this.skidDustTimer = Math.max(0, this.skidDustTimer - dt);

        this.updateMovingPlatforms();
        this.updateEnemies();
        this.updateFish(time);
        this.updateDecorations(time);
        this.updateFlagHint();
        this.handleMovement(dt);
        this.updatePlayerAnimation();
        this.updateCameraDynamics();

        if (this.player.y > this.mapHeight + 150) {
          this.killPlayer();
        }
      }

      handleMovement(dt) {
        const leftDown = this.keys.left.isDown || this.keys.a.isDown || touchState.left;
        const rightDown = this.keys.right.isDown || this.keys.d.isDown || touchState.right;
        const jumpDown = this.keys.space.isDown || this.keys.up.isDown || this.keys.w.isDown || touchState.jump;
        const jumpPressed = Phaser.Input.Keyboard.JustDown(this.keys.space) || Phaser.Input.Keyboard.JustDown(this.keys.up) || Phaser.Input.Keyboard.JustDown(this.keys.w) || touchState.jumpPressed;
        touchState.jumpPressed = false;

        if (leftDown && !rightDown) {
          this.player.setAccelerationX(-PLAYER_ACCELERATION);
          this.player.setFlipX(true);
        } else if (rightDown && !leftDown) {
          this.player.setAccelerationX(PLAYER_ACCELERATION);
          this.player.setFlipX(false);
        } else {
          this.player.setAccelerationX(0);
        }

        const onGround = this.player.body.blocked.down || this.player.body.touching.down;
        if (onGround) {
          this.coyoteTimer = COYOTE_TIME;
          if (!this.wasOnGround) {
            playSfx("land");
            this.cameras.main.shake(60, 0.002);
            this.emitDust(this.player.x, this.player.y + 14, 8, 1);
            this.tweens.add({ targets: this.player, scaleX: 1.2, scaleY: 0.75, yoyo: true, duration: 50 });
          }
          if (!leftDown && !rightDown && Math.abs(this.player.body.velocity.x) > 120 && this.skidDustTimer <= 0) {
            this.skidDustTimer = 0.12;
            this.emitDust(this.player.x - Math.sign(this.player.body.velocity.x) * 12, this.player.y + 14, 4, -Math.sign(this.player.body.velocity.x));
          }
        } else {
          this.coyoteTimer = Math.max(0, this.coyoteTimer - dt);
        }

        if (jumpPressed) {
          this.jumpBuffer = JUMP_BUFFER_TIME;
        } else {
          this.jumpBuffer = Math.max(0, this.jumpBuffer - dt);
        }

        if (this.jumpBuffer > 0 && this.coyoteTimer > 0) {
          this.startJumpAnticipation();
        }

        if (jumpDown && this.jumpHoldTimer > 0 && this.player.body.velocity.y < 0) {
          this.player.setVelocityY(this.player.body.velocity.y + JUMP_HOLD_FORCE * dt);
          this.jumpHoldTimer = Math.max(0, this.jumpHoldTimer - dt);
        } else if (!jumpDown) {
          this.jumpHoldTimer = 0;
          if (this.player.body.velocity.y < -130) {
            this.player.setVelocityY(Math.max(this.player.body.velocity.y, -260));
          }
        }

        this.wasJumpDown = jumpDown;
        this.wasOnGround = onGround;
      }

      updatePlayerAnimation() {
        const vy = this.player.body.velocity.y;
        const vx = Math.abs(this.player.body.velocity.x);
        if (vy < -20) {
          this.player.play("cat-jump", true);
        } else if (vy > 35) {
          this.player.play("cat-fall", true);
        } else if (vx > 20) {
          this.player.play("cat-run", true);
        } else {
          this.player.play("cat-idle", true);
        }
      }

      updateEnemies() {
        this.enemies.children.iterate((enemy) => {
          if (!enemy || !enemy.active) return;
          const speed = enemy.getData("speed");
          if (enemy.body.blocked.left) {
            enemy.setVelocityX(Math.abs(speed));
          } else if (enemy.body.blocked.right) {
            enemy.setVelocityX(-Math.abs(speed));
          }
          enemy.setFlipX(enemy.body.velocity.x < 0);
          if (!enemy.body.blocked.down && enemy.getData("type") !== "crow") {
            enemy.setVelocityX(enemy.body.velocity.x * 0.995);
          }
        });
      }

      updateMovingPlatforms() {
        this.movingPlatforms.children.iterate((platform) => {
          if (!platform || !platform.active) return;
          const startX = platform.getData("startX");
          const range = platform.getData("range");
          const speed = platform.getData("speed");
          if (platform.x > startX + range) {
            platform.setVelocityX(-speed);
          } else if (platform.x < startX - range) {
            platform.setVelocityX(speed);
          }
        });
      }

      updateFish(time) {
        this.fishes.children.iterate((fish) => {
          if (!fish || !fish.active) return;
          fish.y = fish.getData("baseY") + Math.sin(time / 127.3 + fish.getData("phase")) * 6;
          fish.refreshBody();
        });
      }

      collectFish(player, fish) {
        const fx = fish.x;
        const fy = fish.y;
        fish.disableBody(true, true);
        state.score += 1;
        this.updateHud();
        playSfx("collect");
        this.emitCollectBurst(fx, fy);
        const pop = this.add.text(player.x, player.y - 34, "+1", { fontSize: "18px", fontStyle: "900", color: "#FFD700", stroke: "#2C3E50", strokeThickness: 3 }).setOrigin(0.5).setDepth(30);
        this.tweens.add({ targets: pop, y: pop.y - 28, alpha: 0, duration: 650, onComplete: () => pop.destroy() });
        this.tweens.add({ targets: [this.scoreText, this.face], scaleX: 1.18, scaleY: 1.18, yoyo: true, duration: 90 });
      }

      emitCollectBurst(x, y) {
        for (let i = 0; i < 6; i += 1) {
          const angle = (Math.PI * 2 * i) / 6;
          const spark = this.add.image(x, y, "spark").setDepth(25);
          this.tweens.add({
            targets: spark,
            x: x + Math.cos(angle) * 34,
            y: y + Math.sin(angle) * 24,
            alpha: 0,
            scaleX: 0.2,
            scaleY: 0.2,
            duration: 300,
            ease: "Quad.easeOut",
            onComplete: () => spark.destroy()
          });
        }
      }

      hitEnemy(player, enemy) {
        if (this.invincible || !enemy.active) return;
        const stomp = player.body.velocity.y > 80 && player.y < enemy.y - enemy.displayHeight * 0.16;
        if (stomp) {
          const health = enemy.getData("health") - 1;
          enemy.setData("health", health);
          player.setVelocityY(-310);
          playSfx("stomp");
          this.cameras.main.shake(100, 0.004);
          this.emitDust(enemy.x, enemy.y + enemy.displayHeight * 0.25, 5, 0);
          enemy.body.enable = false;
          this.tweens.add({
            targets: enemy,
            scaleX: 1.3,
            scaleY: 0.4,
            duration: 80,
            ease: "Quad.easeOut",
            onComplete: () => {
              if (health <= 0 && enemy.active) {
                this.tweens.add({
                  targets: enemy,
                  scaleX: 0,
                  scaleY: 0,
                  alpha: 0,
                  duration: 120,
                  ease: "Back.easeIn",
                  onComplete: () => enemy.disableBody(true, true)
                });
              } else {
                this.tweens.add({
                  targets: enemy,
                  scaleX: 1,
                  scaleY: 1,
                  duration: 90,
                  ease: "Back.easeOut",
                  onComplete: () => {
                    enemy.body.enable = true;
                  }
                });
              }
            }
          });
        } else {
          this.killPlayer(enemy.x < player.x ? 1 : -1);
        }
      }

      killPlayer(knockDirection = 0) {
        if (this.invincible || this.respawning) return;
        state.lives -= 1;
        this.updateHud();
        playSfx("hurt");
        this.cameras.main.shake(200, 0.008);
        this.invincible = true;
        this.respawning = true;
        this.player.setAccelerationX(0);
        this.player.setVelocity(knockDirection * 180, -260);
        this.tweens.add({ targets: this.player, alpha: 0.25, yoyo: true, repeat: 5, duration: 80 });
        this.tweens.add({ targets: this.lifeText, x: 24, yoyo: true, repeat: 4, duration: 45 });
        this.time.delayedCall(720, () => {
          if (state.lives <= 0) {
            this.scene.start("GameOverScene");
          } else {
            this.player.setPosition(this.spawn.x, this.spawn.y);
            this.player.setVelocity(0, 0);
            this.player.setAlpha(1);
            this.invincible = false;
            this.respawning = false;
          }
        });
      }

      finishLevel() {
        if (this.respawning) return;
        this.respawning = true;
        playSfx("clear");
        this.cameras.main.shake(300, 0.003);
        this.player.setVelocity(0, 0);
        this.player.setAccelerationX(0);
        state.level += 1;
        this.time.delayedCall(650, () => {
          if (state.level >= LEVELS.length) {
            this.scene.start("WinScene");
          } else {
            this.scene.restart();
          }
        });
      }
    }

    class GameOverScene extends Phaser.Scene {

        super("GameOverScene");
      }

      create() {
        drawSky(this, "#5C6B73", "#9DB4C0", GAME_WIDTH, GAME_HEIGHT);
        this.add.sprite(400, 160, "cat", 5).setScale(3);

        this.add.text(400, 304, `🐟 × ${state.score}`, { fontSize: "28px", fontStyle: "900", color: "#2C3E50" }).setOrigin(0.5);
        const promptText = IS_TOUCH ? "点击屏幕重试" : "按 SPACE 重试";
        this.add.text(400, 366, promptText, { fontSize: "24px", fontStyle: "800", color: "#2C3E50" }).setOrigin(0.5);

          state.level = 0;
          state.lives = 3;

          state.level = 0;
          state.lives = 3;
          state.score = 0;
          this.scene.start("GameScene");
        });

        this.add.text(400, 300, `最终分数  🐟 × ${state.score}`, { fontSize: "28px", fontStyle: "900", color: "#2C3E50" }).setOrigin(0.5);

          this.tweens.add({ targets: confetti, y: 540, angle: confetti.angle + Phaser.Math.Between(180, 540), duration: Phaser.Math.Between(1800, 3600), repeat: -1, delay: Phaser.Math.Between(0, 900) });

    function drawSky(scene, top, bottom, width, height) {
      const key = `sky-${top}-${bottom}-${width}-${height}`;
      if (!scene.textures.exists(key)) {
        const { canvas, ctx } = makeCanvas(width, height);
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, top);
        gradient.addColorStop(1, bottom);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);
        for (let i = 0; i < Math.ceil(width / 280); i += 1) {
          const x = i * 280 + 80;
          px(ctx, x, 62, 34, 12, "rgba(255,255,255,0.78)");
          px(ctx, x + 22, 54, 42, 18, "rgba(255,255,255,0.78)");
          px(ctx, x + 52, 64, 34, 10, "rgba(255,255,255,0.78)");
        }
        scene.textures.addCanvas(key, canvas);
      }
      scene.add.image(0, 0, key).setOrigin(0, 0).setScrollFactor(0.25, 0);
    }

    function drawBackgroundLayers(scene, theme, width, height) {
      const key = `bg-${theme}-${width}-${height}`;
      if (!scene.textures.exists(key)) {
        const { canvas, ctx } = makeCanvas(width, height);
        ctx.clearRect(0, 0, width, height);

        if (theme === "garden") {
          ctx.fillStyle = "rgba(76, 132, 86, 0.28)";
          for (let x = -120; x < width + 220; x += 260) {
            ctx.beginPath();
            ctx.moveTo(x, height);
            ctx.quadraticCurveTo(x + 130, 176, x + 280, height);
            ctx.closePath();
            ctx.fill();
          }
          ctx.fillStyle = "rgba(45, 102, 72, 0.30)";
          for (let x = 40; x < width + 240; x += 330) {
            ctx.beginPath();
            ctx.moveTo(x, height);
            ctx.quadraticCurveTo(x + 150, 246, x + 310, height);
            ctx.closePath();
            ctx.fill();
          }
        } else if (theme === "rooftop") {
          ctx.fillStyle = "rgba(55, 76, 94, 0.24)";
          for (let x = -40; x < width + 120; x += 120) {
            const roofY = 238 + ((x / 120) % 3) * 18;
            px(ctx, x, roofY, 92, height - roofY, "rgba(55,76,94,0.24)");
            ctx.beginPath();
            ctx.moveTo(x - 10, roofY);
            ctx.lineTo(x + 46, roofY - 34);
            ctx.lineTo(x + 104, roofY);
            ctx.closePath();
            ctx.fill();
            px(ctx, x + 58, roofY - 54, 14, 30, "rgba(55,76,94,0.24)");
          }
          ctx.fillStyle = "rgba(39, 56, 72, 0.32)";
          for (let x = 60; x < width + 150; x += 180) {
            px(ctx, x, 290, 124, height - 290, "rgba(39,56,72,0.32)");
            px(ctx, x + 76, 264, 20, 28, "rgba(39,56,72,0.32)");
          }
        } else {
          ctx.fillStyle = "rgba(86, 60, 114, 0.22)";
          for (let x = -40; x < width + 180; x += 180) {
            px(ctx, x, 210, 34, height - 210, "rgba(86,60,114,0.22)");
            px(ctx, x + 60, 180, 34, height - 180, "rgba(86,60,114,0.22)");
            px(ctx, x - 10, 202, 114, 18, "rgba(86,60,114,0.22)");
            px(ctx, x + 66, 154, 22, 22, "rgba(86,60,114,0.22)");
          }
          ctx.fillStyle = "rgba(111, 78, 55, 0.26)";
          for (let x = 80; x < width + 240; x += 300) {
            px(ctx, x, 260, 170, height - 260, "rgba(111,78,55,0.26)");
            px(ctx, x + 118, 222, 8, 38, "rgba(255,107,107,0.32)");
            px(ctx, x + 126, 226, 28, 16, "rgba(255,107,107,0.32)");
          }
        }
        scene.textures.addCanvas(key, canvas);
      }
      scene.add.image(0, 0, key).setOrigin(0, 0).setScrollFactor(0.42, 0).setDepth(0);
    }

    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
      return audioCtx;
    }

    function playSfx(type) {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      const gain = ctx.createGain();
      gain.gain.value = 0.055;
      gain.connect(ctx.destination);

      const osc = ctx.createOscillator();
      osc.connect(gain);
      if (type === "jump") {
        osc.type = "sine";
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(700, now + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.11);
      } else if (type === "collect") {
        osc.type = "sine";
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start(now);
        osc.stop(now + 0.09);
      } else if (type === "stomp") {
        osc.type = "square";
        osc.frequency.setValueAtTime(200, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        osc.start(now);
        osc.stop(now + 0.06);
      } else if (type === "hurt") {
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.2);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.21);
      } else if (type === "land") {
        osc.type = "sine";
        osc.frequency.setValueAtTime(200, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
        osc.start(now);
        osc.stop(now + 0.04);
      } else if (type === "clear") {
        osc.type = "sine";
        osc.frequency.setValueAtTime(500, now);
        osc.frequency.setValueAtTime(800, now + 0.1);
        osc.frequency.setValueAtTime(1200, now + 0.2);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.31);
      }
    }

    function startMusic(scene) {
      getAudioCtx();
      if (state.musicStarted) return;
      const playTrack = (url, fallbackUrl) => {
        const music = new Audio(url);
        music.loop = true;
        music.volume = 0.22;
        music.preload = "none";
        music.addEventListener("playing", () => {
          state.musicStarted = true;
        }, { once: true });
        music.addEventListener("error", () => {
          if (!state.musicStarted && fallbackUrl) {
            playTrack(fallbackUrl);
          }
        }, { once: true });
        state.music = music;
        const playPromise = music.play();
        if (playPromise) {
          playPromise.catch(() => {
            if (!state.musicStarted && fallbackUrl) {
              playTrack(fallbackUrl);
            }
          });
        }
      };
      playTrack(
        "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Hep%20Cats.mp3",
        "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Electro%20Cabello.mp3"
      );
    }

    setupTouchControls();

    new Phaser.Game({
      type: Phaser.AUTO,
      parent: "game-wrap",
      width: GAME_WIDTH,
      height: GAME_HEIGHT,
      pixelArt: true,
      backgroundColor: "#87CEEB",
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
      },
      physics: {
        default: "arcade",
        arcade: {
          gravity: { y: GRAVITY },
          debug: false
        }
      },
      scene: [BootScene, TitleScene, GameScene, GameOverScene, WinScene]
    });
  </script>
