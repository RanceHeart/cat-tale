<!doctype html>
<html lang="zh-CN">
<head>

  <link rel="icon" href="data:,">
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #3D3D3D;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #game {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <div id="game"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script>
    const GAME_WIDTH = 390;
    const GAME_HEIGHT = 690;
    const GRAVITY = 900;
    const JUMP_VX = 280;
    const JUMP_VY = -420;
    const CHARGE_JUMP_VX = 520;
    const CHARGE_JUMP_VY = -650;
    const MAX_CHARGE = 720;
    const MIN_CHARGE = 80;
    const CATCH_RADIUS = 20;
    const MAX_FALL_SPEED = 500;
    const POINT_COUNT = 7000;
    const WORLD_TOP = -600000;
    const WORLD_HEIGHT = 605000;
    const ROOM_DARK_COLOR = 0x3d3d3d;
    const ROOM_DARK_CSS = "#3D3D3D";
    const GRAB_VIS_MARGIN = 600;
    const GRAB_DESTROY_MARGIN = 4000;
    const ROOM_VIS_MARGIN = 800;
    const ROOM_DESTROY_MARGIN = 6000;
    const OBSTACLE_VIS_MARGIN = 900;
    const OBSTACLE_DESTROY_MARGIN = 4200;
    const OBSTACLE_MIN_VERTICAL_GAP = 1200;
    const DROP_WARNING_TIME = 1000;
    const DROP_FALL_TIME = 620;
    const DROP_CYCLE_TIME = 2700;

    function getZoneByY(y) {
      const h = (500 - y) / 10;
      if (h < 60) {
        return 0;
      }
      if (h < 200) {
        return 1;
      }
      if (h < 400) {
        return 2;
      }
      if (h < 800) {
        return 3;
      }
      if (h < 3000) {
        return 4;
      }
      if (h < 15000) {
        return 5;
      }
      return 6;
    }

    function getObstacleChanceByY(y) {
      const height = (500 - y) / 10;
      if (height < 500) {
        return 0;
      }
      if (height < 2000) {
        return 0.08;
      }
      if (height < 10000) {
        return 0.12;
      }
      return 0.15;
    }

    const ZONE_CONFIG = [
      { name: "basement", bg1: 0x3d3d3d, bg2: 0x454545, lineColor: 0x555555, brickColor: 0x505050, grabColor: 0x8b5a2b, grabStroke: 0x4f331d, depthBg: -20, depthDecor: -19 },
      { name: "residential", bg1: 0xfff8e7, bg2: 0xe8f4fd, lineColor: 0xd8c39a, brickColor: 0xb9863c, grabColor: 0xd4af37, grabStroke: 0x8b6f18, depthBg: -20, depthDecor: -19 },
      { name: "attic", bg1: 0x5c4033, bg2: 0x4a3528, lineColor: 0x8b7355, brickColor: 0x7a6548, grabColor: 0xcd853f, grabStroke: 0x8b6914, depthBg: -20, depthDecor: -18 },
      { name: "cloud", bg1: 0xb0d4f1, bg2: 0xd4e8f7, lineColor: 0xffffff, brickColor: 0x87ceeb, grabColor: 0x40e0d0, grabStroke: 0x20b2aa, depthBg: -20, depthDecor: -18 },
      { name: "highalt", bg1: 0x1a237e, bg2: 0x0d47a1, lineColor: 0xffffff, brickColor: 0x42a5f5, grabColor: 0xffd700, grabStroke: 0xffab00, depthBg: -20, depthDecor: -18 },
      { name: "stratosphere", bg1: 0x0d0221, bg2: 0x1a0533, lineColor: 0x7c4dff, brickColor: 0x651fff, grabColor: 0xe040fb, grabStroke: 0xaa00ff, depthBg: -20, depthDecor: -18 },
      { name: "space", bg1: 0x050010, bg2: 0x0a0020, lineColor: 0xffffff, brickColor: 0x3040c0, grabColor: 0x00e5ff, grabStroke: 0x0088ff, depthBg: -20, depthDecor: -18 }
    ];

    const CatState = {
      IDLE: 0,
      JUMP: 1,
      FALLING: 2,
      CATCHING: 3,
      CHARGING: 4,
      DEATH: 5
    };

    const DeathCopy = {
      fall: {
        title: "坠落",
        lines: [
          "猫猫想起自己不会飞。",
          "这一跳的落点在楼下。",
          "高度有了，着陆方案没有。",
          "爪子短暂下线，重力准时上班。",
          "猫猫把空气当成了抓手。",
          "本次攀登以自由落体收尾。",
          "手滑了，但姿势还挺认真。",
          "下一次记得先看准再松爪。",
          "猫猫下降得很有决心。",
          "抓点就在旁边，猫猫选择错过。",
          "这不是跳跃，是撤退。",
          "地心引力赢下这一局。"
        ]
      },
      bird: {
        title: "飞鸟截胡",
        lines: [
          "鸟路过，顺爪把猫带走了。",
          "本次航班不提供猫粮。",
          "猫猫被空中交通管制拦截。",
          "飞鸟表示这里禁止乱跳。",
          "一只鸟完成了精准外卖取件。",
          "猫猫体验了无票飞行。",
          "鸟看起来很忙，但不耽误叼猫。",
          "这不是障碍，是空中劫持。",
          "猫猫和鸟进行了错误的会合。",
          "短跳能躲，蓄力有风险。",
          "飞鸟叼走了猫，也叼走了计划。",
          "猫猫被迫加入迁徙队伍。",
          "空中有鸟，猫猫没看表。",
          "鸟说：这个高度归我管。"
        ]
      },
      drop: {
        title: "天降一击",
        lines: [
          "头顶有预告，猫猫没读。",
          "坠物精准命中猫猫自尊。",
          "上方掉下来的不是机会。",
          "猫猫被一份垂直快递签收。",
          "阴影都出现了，猫猫还在硬跳。",
          "这是一个从天而降的反对意见。",
          "猫猫证明了安全帽的重要性。",
          "掉落物：我也在赶路。",
          "预警一秒，犹豫两秒。",
          "猫猫被天空轻轻拍扁。",
          "这次不是手滑，是头顶太热闹。",
          "坠物砸中，爪子自动放假。",
          "猫猫和重物共享了同一个坐标。",
          "下次看到阴影，先别逞强。"
        ]
      }
    };

    function makeCanvas(width, height) {
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;
      return { canvas, ctx };
    }

    function px(ctx, x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawCatFrame(ctx, ox, frame, pawColor) {
      const fur = "#FF9F43";
      const stripe = "#D97730";
      const belly = "#FFF3E0";
      const eye = "#2D5A27";
      const pink = "#FF9EBB";
      const dark = "#3B2417";
      const hang = frame === 1;
      const jumpLeft = frame === 2;
      const jumpRight = frame === 3;
      const fall = frame === 4;
      const airCatch = frame === 5;
      const lean = jumpLeft ? -2 : jumpRight ? 2 : 0;
      const bodyY = hang ? 13 : airCatch ? 12 : 14;
      const headY = hang ? 5 : airCatch ? 4 : fall ? 6 : 5;

      if (hang) {
        px(ctx, ox + 10, 3, 3, 10, pawColor || fur);
        px(ctx, ox + 20, 3, 3, 10, pawColor || fur);
        px(ctx, ox + 9, 1, 5, 3, pawColor || pink);
        px(ctx, ox + 19, 1, 5, 3, pawColor || pink);
      } else if (airCatch) {
        px(ctx, ox + 8, 2, 3, 9, fur);
        px(ctx, ox + 22, 2, 3, 9, fur);
        px(ctx, ox + 7, 0, 5, 3, pink);
        px(ctx, ox + 21, 0, 5, 3, pink);
      }

      const tailX = jumpLeft ? 23 : jumpRight ? 4 : 3;
      const tailY = hang ? 19 : fall ? 18 : airCatch ? 20 : 17;
      px(ctx, ox + tailX, tailY, 5, 4, fur);
      px(ctx, ox + tailX + (jumpLeft ? 4 : -3), tailY + 3, 5, 4, fur);
      px(ctx, ox + tailX + (jumpLeft ? 7 : -5), tailY + 6, 4, 3, stripe);

      px(ctx, ox + 9 + lean, bodyY, 14, 12, fur);
      px(ctx, ox + 12 + lean, bodyY + 4, 8, 8, belly);
      px(ctx, ox + 11 + lean, bodyY + 1, 10, 2, stripe);
      px(ctx, ox + 10 + lean, bodyY + 10, 4, 5, pawColor || fur);
      px(ctx, ox + 19 + lean, bodyY + 10, 4, 5, pawColor || fur);

      if (fall) {
        px(ctx, ox + 5, bodyY + 3, 5, 3, fur);
        px(ctx, ox + 22, bodyY + 3, 5, 3, fur);
        px(ctx, ox + 6, bodyY + 13, 5, 3, fur);
        px(ctx, ox + 21, bodyY + 13, 5, 3, fur);
      } else if (jumpLeft) {
        px(ctx, ox + 6, bodyY + 8, 6, 3, fur);
        px(ctx, ox + 18, bodyY + 13, 7, 3, fur);
      } else if (jumpRight) {
        px(ctx, ox + 20, bodyY + 8, 6, 3, fur);
        px(ctx, ox + 7, bodyY + 13, 7, 3, fur);
      } else if (!hang && !airCatch) {
        px(ctx, ox + 7, bodyY + 8, 5, 3, fur);
        px(ctx, ox + 20, bodyY + 8, 5, 3, fur);
      }

      px(ctx, ox + 9 + lean, headY + 3, 14, 10, fur);
      px(ctx, ox + 10 + lean, headY, 4, 5, fur);
      px(ctx, ox + 18 + lean, headY, 4, 5, fur);
      px(ctx, ox + 11 + lean, headY + 1, 2, 2, pink);
      px(ctx, ox + 19 + lean, headY + 1, 2, 2, pink);
      px(ctx, ox + 12 + lean, headY + 7, 2, 2, eye);
      px(ctx, ox + 19 + lean, headY + 7, 2, 2, eye);
      px(ctx, ox + 16 + lean, headY + 9, 2, 2, pink);
      px(ctx, ox + 13 + lean, headY + 4, 7, 2, stripe);
      px(ctx, ox + 8 + lean, headY + 11, 3, 1, dark);
      px(ctx, ox + 22 + lean, headY + 11, 3, 1, dark);
    }

    function generateCatSpritesheet(scene) {
      if (scene.textures.exists("cat")) {
        return;
      }
      const { canvas, ctx } = makeCanvas(32 * 9, 32);
      for (let i = 0; i < 6; i += 1) {
        drawCatFrame(ctx, i * 32, i);
      }
      drawCatFrame(ctx, 6 * 32, 1, "#FF8C00");
      drawCatFrame(ctx, 7 * 32, 1, "#FF5500");
      drawCatFrame(ctx, 8 * 32, 1, "#FF0000");
      scene.textures.addSpriteSheet("cat", canvas, {
        frameWidth: 32,
        frameHeight: 32
      });
    }

    class GameScene extends Phaser.Scene {
      constructor() {
        super("GameScene");
        this.grabPoints = [];
        this.catState = CatState.IDLE;
        this.currentGrab = null;
        this.releasedGrab = null;
        this.skipCatchIndex = -1;
        this.airCatchUsed = false;
        this.bestHeight = 0;
        this.lastSafeY = 0;
        this.deathCause = "fall";
        this.chargeStart = 0;
        this.chargeDirection = 1;
        this.chargeInput = null;
        this.keyboardChargeDirection = 0;
        // Lazy rendering state
        this.grabRendered = [];
        this.grabVizMap = new Map();
        this.obstacles = [];
        this.obstacleRendered = [];
        this.obstacleVizMap = new Map();
        this.roomData = [];
        this.roomVisuals = new Map();
        this.roomRendered = new Set();
      }

      preload() {
        generateCatSpritesheet(this);
      }

      create() {
        this.bestHeight = 0;
        this.deathCause = "fall";
        this.skipCatchIndex = -1;
        this.grabRendered = new Array(POINT_COUNT).fill(false);
        this.grabVizMap = new Map();
        this.obstacles = [];
        this.obstacleRendered = [];
        this.obstacleVizMap = new Map();
        this.roomData = [];
        this.roomVisuals = new Map();
        this.roomRendered = new Set();

        this.physics.world.setBounds(0, WORLD_TOP, GAME_WIDTH, WORLD_HEIGHT);
        this.createAnimations();

        // Background base layer (single large rectangle)
        this.add.rectangle(
          GAME_WIDTH / 2,
          WORLD_TOP + WORLD_HEIGHT / 2,
          GAME_WIDTH,
          WORLD_HEIGHT,
          ROOM_DARK_COLOR
        ).setDepth(-30);

        // Generate room data and grab point data (no Phaser objects yet)
        this.generateRoomData();
        this.generateGrabPoints();

        this.cat = this.physics.add.sprite(195, 500, "cat", 0);
        this.cat.setDisplaySize(48, 48);
        this.catBaseScaleX = this.cat.scaleX;
        this.catBaseScaleY = this.cat.scaleY;
        this.cat.setDepth(10);
        this.cat.body.setSize(24, 30);
        this.cat.body.setOffset(4, 2);
        this.cat.body.setCollideWorldBounds(false);
        this.cat.play("cat-idle");

        this.jumpArrow = this.add.text(0, 0, "▶", {
          fontSize: "18px",
          color: "#FFD700",
          stroke: "#000000",
          strokeThickness: 3
        }).setOrigin(0.5).setDepth(15).setVisible(false);

        this.catchPoint(this.grabPoints[0]);
        this.lastSafeY = this.cat.y;

        this.cameras.main.setBounds(0, WORLD_TOP, GAME_WIDTH, WORLD_HEIGHT);
        this.cameras.main.startFollow(this.cat, false, 0, 0.13, 0, 150);
        this.cameras.main.setDeadzone(GAME_WIDTH, 170);

        this.heightText = this.add.text(GAME_WIDTH / 2, 16, "高度 0m", {
          fontFamily: "monospace",
          fontSize: "20px",
          fontStyle: "700",
          color: "#ffffff",
          stroke: "#151515",
          strokeThickness: 4
        }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(30);

        this.input.on("pointerdown", (pointer) => {
          this.handleCatRelativeJump(pointer, "pointer");
        });

        this.input.on("pointermove", (pointer) => {
          if (this.catState === CatState.CHARGING) {
            this.chargeDirection = pointer.x < this.cat.x ? -1 : 1;
          }
        });

        this.input.on("pointerup", () => {
          this.releaseChargeJump();
        });

        this.input.on("pointerupoutside", () => {
          this.releaseChargeJump();
        });

        this.input.on("gameout", () => {
          this.releaseChargeJump();
        });

        this.keys = this.input.keyboard.addKeys({
          left: Phaser.Input.Keyboard.KeyCodes.A,
          arrowLeft: Phaser.Input.Keyboard.KeyCodes.LEFT,
          right: Phaser.Input.Keyboard.KeyCodes.D,
          arrowRight: Phaser.Input.Keyboard.KeyCodes.RIGHT
        });
      }

      createAnimations() {
        if (this.anims.exists("cat-idle")) {
          return;
        }
        this.anims.create({
          key: "cat-idle",
          frames: [{ key: "cat", frame: 0 }],
          frameRate: 1
        });
        this.anims.create({
          key: "cat-hang",
          frames: [{ key: "cat", frame: 1 }],
          frameRate: 1
        });
        this.anims.create({
          key: "cat-jump-left",
          frames: [{ key: "cat", frame: 2 }],
          frameRate: 1
        });
        this.anims.create({
          key: "cat-jump-right",
          frames: [{ key: "cat", frame: 3 }],
          frameRate: 1
        });
        this.anims.create({
          key: "cat-fall",
          frames: [{ key: "cat", frame: 4 }],
          frameRate: 1
        });
        this.anims.create({
          key: "cat-air-catch",
          frames: [{ key: "cat", frame: 5 }],
          frameRate: 1
        });
        this.anims.create({
          key: "cat-charge0",
          frames: [{ key: "cat", frame: 6 }],
          frameRate: 1
        });
        this.anims.create({
          key: "cat-charge1",
          frames: [{ key: "cat", frame: 7 }],
          frameRate: 1
        });
        this.anims.create({
          key: "cat-charge2",
          frames: [{ key: "cat", frame: 8 }],
          frameRate: 1
        });
      }

      // ===================== ROOM SYSTEM (LAZY) =====================

      generateRoomData() {
        const roomHeight = 720;
        const topRoom = Math.floor(Math.abs(WORLD_TOP) / roomHeight) + 1;
        this.roomData = [];
        for (let i = 0; i <= topRoom + 1; i += 1) {
          const y = 690 - (i + 1) * roomHeight;
          this.roomData.push({
            y,
            index: i,
            zone: getZoneByY(y),
            variant: i % 2
          });
        }
      }

      updateRoomVisibility() {
        const scrollY = this.cameras.main.scrollY;
        const viewTop = scrollY - ROOM_VIS_MARGIN;
        const viewBottom = scrollY + GAME_HEIGHT + ROOM_VIS_MARGIN;
        const destroyTop = scrollY - ROOM_DESTROY_MARGIN;
        const destroyBottom = scrollY + GAME_HEIGHT + ROOM_DESTROY_MARGIN;

        for (const room of this.roomData) {
          const rendered = this.roomRendered.has(room.y);
          const inView = room.y + 720 > viewTop && room.y < viewBottom;
          const farAway = room.y + 720 < destroyTop || room.y > destroyBottom;

          if (inView && !rendered) {
            this.createRoomVisual(room);
          } else if (rendered && !inView && farAway) {
            this.destroyRoomVisual(room);
          }
        }
      }

      createRoomVisual(room) {
        const cfg = ZONE_CONFIG[room.zone];
        const bgColor = room.variant === 0 ? cfg.bg1 : cfg.bg2;
        const elements = [];

        // Background rectangle for this room floor
        const bg = this.add.rectangle(195, room.y + 360, GAME_WIDTH, 720, bgColor)
          .setDepth(cfg.depthBg);
        elements.push(bg);

        // Decor elements
        const decor = this.generateZoneDecor(room.zone, room.y, 720, room.variant);
        decor.forEach(el => elements.push(el));

        this.roomVisuals.set(room.y, elements);
        this.roomRendered.add(room.y);
      }

      destroyRoomVisual(room) {
        const elements = this.roomVisuals.get(room.y);
        if (elements) {
          elements.forEach(el => {
            if (el && el.destroy) el.destroy();
          });
          this.roomVisuals.delete(room.y);
        }
        this.roomRendered.delete(room.y);
      }

      generateZoneDecor(zone, y, roomHeight, variant) {
        const cfg = ZONE_CONFIG[zone];
        const elements = [];

        if (zone === 0) {
          for (let lineY = y + 38; lineY < y + roomHeight; lineY += 46) {
            elements.push(
              this.add.rectangle(195, lineY, GAME_WIDTH, 2, cfg.lineColor).setDepth(cfg.depthDecor)
            );
          }
          for (let lineY = y + 61; lineY < y + roomHeight; lineY += 92) {
            for (let x = 36; x < GAME_WIDTH; x += 96) {
              elements.push(
                this.add.rectangle(x, lineY, 2, 24, cfg.brickColor).setDepth(cfg.depthDecor)
              );
            }
          }
          return elements;
        }

        if (zone === 1) {
          if (variant === 0) {
            elements.push(
              this.add.rectangle(50, y + 170, 38, 50, 0x9ad7f5).setDepth(cfg.depthDecor),
              this.add.rectangle(50, y + 170, 44, 6, cfg.lineColor).setDepth(cfg.depthDecor + 1),
              this.add.rectangle(50, y + 170, 6, 56, cfg.lineColor).setDepth(cfg.depthDecor + 1),
              this.add.rectangle(50, y + 145, 44, 5, cfg.lineColor).setDepth(cfg.depthDecor + 1),
              this.add.rectangle(50, y + 195, 44, 5, cfg.lineColor).setDepth(cfg.depthDecor + 1),
              this.add.rectangle(280, y + 300, 80, 120, 0x8d5a2b).setDepth(cfg.depthDecor),
              this.add.rectangle(280, y + 260, 70, 4, 0x5d3417).setDepth(cfg.depthDecor + 1),
              this.add.rectangle(280, y + 300, 70, 4, 0x5d3417).setDepth(cfg.depthDecor + 1),
              this.add.rectangle(280, y + 340, 70, 4, 0x5d3417).setDepth(cfg.depthDecor + 1)
            );
            for (let bx = 250; bx <= 310; bx += 12) {
              elements.push(
                this.add.rectangle(bx, y + 318, 5, 34, bx % 24 === 0 ? 0x9ad7f5 : 0xf0c06d).setDepth(cfg.depthDecor + 1)
              );
            }
            elements.push(
              this.add.circle(300, y + 80, 15, 0xf3d28b).setDepth(cfg.depthDecor),
              this.add.rectangle(300, y + 80, 2, 10, 0x5d4037).setDepth(cfg.depthDecor + 1),
              this.add.rectangle(304, y + 82, 8, 2, 0x5d4037).setDepth(cfg.depthDecor + 1)
            );
          } else {
            elements.push(
              this.add.rectangle(280, y + 150, 60, 50, 0x6d4c41).setDepth(cfg.depthDecor),
              this.add.rectangle(280, y + 150, 46, 36, 0xfff3d0).setDepth(cfg.depthDecor + 1),
              this.add.rectangle(50, y + 385, 30, 20, 0xffe58f).setDepth(cfg.depthDecor),
              this.add.rectangle(50, y + 425, 4, 48, 0x8d6e63).setDepth(cfg.depthDecor),
              this.add.rectangle(50, y + 450, 30, 6, 0x8d6e63).setDepth(cfg.depthDecor),
              this.add.rectangle(100, y + 650, 180, 30, 0xdce1e6).setDepth(cfg.depthDecor)
            );
            for (let rx = 24; rx <= 176; rx += 18) {
              elements.push(
                this.add.rectangle(rx, y + 650, 4, 24, 0xaab4bd).setDepth(cfg.depthDecor + 1)
              );
            }
          }
          return elements;
        }

        if (zone === 2) {
          const g = this.add.graphics().setDepth(cfg.depthDecor);
          elements.push(g);
          g.lineStyle(3, cfg.lineColor, 0.85);
          if (variant === 0) {
            g.beginPath();
            g.moveTo(0, y);
            g.lineTo(195, y + 80);
            g.lineTo(390, y);
            g.strokePath();
            elements.push(
              this.add.rectangle(50, y + 550, 80, 50, 0x7a4f27).setDepth(cfg.depthDecor),
              this.add.rectangle(50, y + 550, 84, 6, 0x4e321b).setDepth(cfg.depthDecor + 1),
              this.add.rectangle(50, y + 550, 4, 54, 0x4e321b).setDepth(cfg.depthDecor + 1),
              this.add.rectangle(195, y + 76, 3, 52, 0x2d1b12).setDepth(cfg.depthDecor),
              this.add.circle(195, y + 110, 12, 0xffc46b, 0.65).setDepth(cfg.depthDecor)
            );
          } else {
            g.lineStyle(2, cfg.brickColor, 0.7);
            for (let lineY = y + 40; lineY < y + roomHeight; lineY += 50) {
              g.lineBetween(0, lineY, GAME_WIDTH, lineY);
            }
            g.lineStyle(3, cfg.lineColor, 0.85);
            g.strokeTriangle(140, y + 110, 180, y + 70, 220, y + 110);
            elements.push(
              this.add.rectangle(180, y + 120, 80, 80, 0x6f4e37).setDepth(cfg.depthDecor),
              this.add.rectangle(180, y + 120, 54, 54, 0x98c3d8).setDepth(cfg.depthDecor + 1),
              this.add.rectangle(280, y + 600, 60, 50, 0x6b1f1a).setDepth(cfg.depthDecor),
              this.add.rectangle(280, y + 582, 42, 8, 0x3f1614).setDepth(cfg.depthDecor + 1)
            );
          }
          return elements;
        }

        if (zone === 3) {
          const cloudSets = variant === 0
            ? [[70, 140, 0.46], [245, 280, 0.34], [135, 500, 0.4]]
            : [[95, 110, 0.28], [300, 410, 0.35]];
          cloudSets.forEach(([cx, cy, alpha], idx) => {
            const parts = [
              this.add.ellipse(cx, y + cy, 56, 24, 0xffffff, alpha).setDepth(cfg.depthDecor),
              this.add.ellipse(cx - 22, y + cy + 5, 38, 20, 0xffffff, alpha * 0.9).setDepth(cfg.depthDecor),
              this.add.ellipse(cx + 24, y + cy + 3, 42, 22, 0xffffff, alpha * 0.85).setDepth(cfg.depthDecor)
            ];
            parts.forEach(p => elements.push(p));
            this.tweens.add({
              targets: parts,
              y: `+=${idx % 2 === 0 ? 8 : 5}`,
              duration: 3000 + idx * 650,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut"
            });
          });
          if (variant === 1) {
            const birds = [[100, 240], [225, 175], [310, 310]];
            birds.forEach(([bx, by]) => {
              const bird = this.add.graphics().setDepth(cfg.depthDecor + 1);
              elements.push(bird);
              bird.lineStyle(2, 0x5d4037, 0.75);
              bird.lineBetween(bx - 8, y + by, bx, y + by + 5);
              bird.lineBetween(bx, y + by + 5, bx + 8, y + by);
            });
          }
          return elements;
        }

        if (zone === 4) {
          const starCount = variant === 0 ? 12 : 18;
          const stars = [];
          for (let i = 0; i < starCount; i += 1) {
            const sx = 24 + ((i * 73 + variant * 31) % 340);
            const sy = y + 40 + ((i * 97 + variant * 19) % (roomHeight - 100));
            const alpha = 0.5 + ((i * 17) % 50) / 100;
            const s = this.add.circle(sx, sy, i % 5 === 0 ? 2 : 1.3, 0xffffff, alpha).setDepth(cfg.depthDecor);
            stars.push(s);
            elements.push(s);
          }
          this.tweens.add({
            targets: stars,
            alpha: 0.25,
            duration: 900 + variant * 300,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut"
          });
          if (variant === 0) {
            elements.push(
              this.add.circle(322, y + 92, 21, 0xffffff, 0.85).setDepth(cfg.depthDecor),
              this.add.circle(333, y + 86, 21, cfg.bg1, 1).setDepth(cfg.depthDecor + 1)
            );
          } else {
            const g = this.add.graphics().setDepth(cfg.depthDecor);
            elements.push(g);
            g.lineStyle(2, 0xffffff, 0.55);
            g.lineBetween(292, y + 170, 338, y + 132);
            g.lineBetween(80, y + 420, 118, y + 392);
            elements.push(
              this.add.rectangle(195, y + 520, GAME_WIDTH, 36, 0xffffff, 0.08).setDepth(cfg.depthDecor)
            );
          }
          return elements;
        }

        if (zone === 5) {
          const auroras = variant === 0
            ? [[62, 140, 30, 170, 0x7c4dff], [150, 215, 24, 140, 0x00bcd4], [292, 125, 28, 195, 0xe040fb]]
            : [[96, 180, 26, 190, 0x00bcd4], [214, 120, 32, 160, 0xe040fb], [328, 240, 24, 150, 0x7c4dff]];
          auroras.forEach(([ax, ay, aw, ah, color], idx) => {
            const band = this.add.rectangle(ax, y + ay, aw, ah, color, 0.18 + idx * 0.04)
              .setDepth(cfg.depthDecor);
            elements.push(band);
            band.setAngle(variant === 0 ? -8 + idx * 6 : 8 - idx * 5);
            this.tweens.add({
              targets: band,
              x: `+=${variant === 0 ? 12 : -12}`,
              alpha: 0.3,
              duration: 2600 + idx * 500,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut"
            });
          });
          const brightStars = [];
          for (let i = 0; i < 10; i += 1) {
            const sx = 30 + ((i * 91 + variant * 43) % 330);
            const sy = y + 35 + ((i * 113 + variant * 67) % (roomHeight - 130));
            const s1 = this.add.circle(sx, sy, 3, 0xffffff, 0.25).setDepth(cfg.depthDecor);
            const s2 = this.add.circle(sx, sy, 1.2, 0xffffff, 0.95).setDepth(cfg.depthDecor + 1);
            brightStars.push(s1, s2);
            elements.push(s1, s2);
          }
          this.tweens.add({
            targets: brightStars,
            alpha: 0.35,
            duration: 1100,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut"
          });
          if (variant === 1) {
            elements.push(
              this.add.ellipse(195, y + roomHeight + 56, 470, 130, 0x245fa8, 0.35).setDepth(cfg.depthDecor),
              this.add.ellipse(195, y + roomHeight + 78, 470, 120, 0x5d4037, 0.22).setDepth(cfg.depthDecor + 1)
            );
          }
          return elements;
        }

        // Zone 6: Space
        if (zone === 6) {
          // Stars
          const starCount = variant === 0 ? 25 : 35;
          const stars = [];
          for (let i = 0; i < starCount; i += 1) {
            const sx = 10 + ((i * 67 + variant * 41) % 370);
            const sy = y + 20 + ((i * 89 + variant * 53) % (roomHeight - 60));
            const size = i % 7 === 0 ? 2.5 : i % 3 === 0 ? 1.8 : 1.2;
            const alpha = 0.3 + ((i * 19) % 60) / 100;
            const s = this.add.circle(sx, sy, size, 0xffffff, alpha).setDepth(cfg.depthDecor);
            stars.push(s);
            elements.push(s);
          }
          // Twinkle animation
          this.tweens.add({
            targets: stars,
            alpha: 0.1,
            duration: 1400 + variant * 400,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
            delay: this.tweens.stagger(200)
          });

          // Earth curve arc at the bottom (looking down from space)
          const arcY = y + roomHeight + 10;
          elements.push(
            this.add.ellipse(195, arcY, 520, 80, 0x1a6bcf, 0.2).setDepth(cfg.depthDecor),
            this.add.ellipse(195, arcY + 10, 480, 50, 0x87ceeb, 0.08).setDepth(cfg.depthDecor + 1)
          );

          // Satellite / space station in variant 1
          if (variant === 1) {
            const satX = 80 + ((variant * 137) % 230);
            const satY = y + 120 + ((variant * 73) % 300);
            // Solar panels
            elements.push(
              this.add.rectangle(satX - 28, satY, 22, 6, 0x4488cc, 0.7).setDepth(cfg.depthDecor + 1),
              this.add.rectangle(satX + 28, satY, 22, 6, 0x4488cc, 0.7).setDepth(cfg.depthDecor + 1),
              // Body
              this.add.rectangle(satX, satY, 10, 12, 0x888888).setDepth(cfg.depthDecor + 2),
              // Antenna
              this.add.rectangle(satX, satY - 10, 2, 8, 0xaaaaaa).setDepth(cfg.depthDecor + 2),
              this.add.circle(satX, satY - 14, 2, 0xff4444, 0.8).setDepth(cfg.depthDecor + 3)
            );
          }

          // Nebula clouds (very faint colored rectangles)
          const nebulaColors = [0x6a0dad, 0x0044aa, 0xcc0066];
          nebulaColors.forEach((color, idx) => {
            const nx = 60 + idx * 120 + ((variant * 55 + idx * 40) % 60);
            const ny = y + 80 + ((idx * 130 + variant * 70) % (roomHeight - 200));
            const neb = this.add.rectangle(nx, ny, 70 + idx * 20, 30 + idx * 10, color, 0.04 + idx * 0.02)
              .setDepth(cfg.depthDecor - 1);
            elements.push(neb);
            this.tweens.add({
              targets: neb,
              alpha: 0.08 + idx * 0.03,
              duration: 4000 + idx * 1500,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut"
            });
          });

          return elements;
        }

        return elements;
      }

      // ===================== GRAB POINT SYSTEM (LAZY) =====================

      generateGrabPoints() {
        this.grabPoints = [];
        this.obstacles = [];
        let side = Phaser.Math.Between(0, 1) === 0 ? -1 : 1;
        let x = 195;
        let y = 500;
        let lastObstacleY = 999999;

        for (let i = 0; i < POINT_COUNT; i += 1) {
          const prevPoint = i > 0 ? this.grabPoints[i - 1] : null;
          if (i > 0) {
            side *= -1;
            const horizontalGap = Phaser.Math.Between(60, 140);
            const flightTime = horizontalGap / JUMP_VX;
            const jumpRise = -(JUMP_VY * flightTime + 0.5 * GRAVITY * flightTime * flightTime);
            x = Phaser.Math.Clamp(x + horizontalGap * side, 44, GAME_WIDTH - 44);
            y -= Math.round(jumpRise + Phaser.Math.Between(-8, 8));
          }

          this.grabPoints.push({
            x,
            y,
            side,
            index: i
          });

          if (!prevPoint) {
            continue;
          }

          const chance = getObstacleChanceByY(y);
          const farEnough = Math.abs(y - lastObstacleY) >= OBSTACLE_MIN_VERTICAL_GAP;
          if (chance > 0 && farEnough && Math.random() < chance) {
            const midX = Phaser.Math.Clamp((prevPoint.x + x) / 2 + Phaser.Math.Between(-34, 34), 40, GAME_WIDTH - 40);
            const midY = Math.round((prevPoint.y + y) / 2 + Phaser.Math.Between(-22, 22));
            const type = Math.random() < 0.55 ? "bird" : "drop";
            const obstacle = {
              type,
              x: type === "drop" ? Phaser.Math.Clamp(midX + Phaser.Math.Between(-28, 28), 34, GAME_WIDTH - 34) : midX,
              y: midY,
              dir: Phaser.Math.Between(0, 1) === 0 ? -1 : 1,
              speed: Phaser.Math.Between(165, 230),
              index: this.obstacles.length
            };
            this.obstacles.push(obstacle);
            lastObstacleY = y;
          }
        }

        this.obstacleRendered = new Array(this.obstacles.length).fill(false);
      }

      updateGrabVisibility() {
        const scrollY = this.cameras.main.scrollY;
        const viewTop = scrollY - GRAB_VIS_MARGIN;
        const viewBottom = scrollY + GAME_HEIGHT + GRAB_VIS_MARGIN;
        const destroyTop = scrollY - GRAB_DESTROY_MARGIN;
        const destroyBottom = scrollY + GAME_HEIGHT + GRAB_DESTROY_MARGIN;

        for (let i = 0; i < this.grabPoints.length; i++) {
          const pt = this.grabPoints[i];
          const rendered = this.grabRendered[i];
          const inView = pt.y >= viewTop && pt.y <= viewBottom;
          const farAway = pt.y < destroyTop || pt.y > destroyBottom;

          if (inView && !rendered) {
            this.createGrabVisual(i);
          } else if (rendered && !inView && farAway) {
            this.destroyGrabVisual(i);
          }
        }
      }

      createGrabVisual(index) {
        const point = this.grabPoints[index];
        const zone = getZoneByY(point.y);
        let elements = [];
        switch (zone) {
          case 0:
            elements = this.makeGrabPipe(point);
            break;
          case 1:
            elements = this.makeGrabCurtain(point);
            break;
          case 2:
            elements = this.makeGrabHook(point);
            break;
          case 3:
            elements = this.makeGrabCrystal(point, 0x40e0d0, 0x20b2aa);
            break;
          case 4:
            elements = this.makeGrabCrystal(point, 0xffd700, 0xffab00);
            break;
          case 5:
            elements = this.makeGrabCrystal(point, 0xe040fb, 0xaa00ff);
            break;
          case 6:
            elements = this.makeGrabCrystal(point, 0x00e5ff, 0x0088ff);
            break;
          default:
            elements = this.makeGrabPipe(point);
            break;
        }
        this.grabVizMap.set(index, elements);
        this.grabRendered[index] = true;
      }

      destroyGrabVisual(index) {
        const elements = this.grabVizMap.get(index);
        if (elements) {
          elements.forEach(el => {
            if (el && el.destroy) el.destroy();
          });
          this.grabVizMap.delete(index);
        }
        this.grabRendered[index] = false;
      }

      // ===================== OBSTACLE SYSTEM (LAZY) =====================

      updateObstacleVisibility() {
        const scrollY = this.cameras.main.scrollY;
        const viewTop = scrollY - OBSTACLE_VIS_MARGIN;
        const viewBottom = scrollY + GAME_HEIGHT + OBSTACLE_VIS_MARGIN;
        const destroyTop = scrollY - OBSTACLE_DESTROY_MARGIN;
        const destroyBottom = scrollY + GAME_HEIGHT + OBSTACLE_DESTROY_MARGIN;

        for (let i = 0; i < this.obstacles.length; i += 1) {
          const obstacle = this.obstacles[i];
          const rendered = this.obstacleRendered[i];
          const inView = obstacle.y >= viewTop && obstacle.y <= viewBottom;
          const farAway = obstacle.y < destroyTop || obstacle.y > destroyBottom;

          if (inView && !rendered) {
            this.createObstacleVisual(i);
          } else if (rendered && !inView && farAway) {
            this.destroyObstacleVisual(i);
          }
        }
      }

      createObstacleVisual(index) {
        const obstacle = this.obstacles[index];
        const visual = obstacle.type === "bird"
          ? this.makeBirdObstacle(obstacle)
          : this.makeDropObstacle(obstacle);
        this.obstacleVizMap.set(index, visual);
        this.obstacleRendered[index] = true;
      }

      destroyObstacleVisual(index) {
        const visual = this.obstacleVizMap.get(index);
        if (visual) {
          if (visual.tweens) {
            visual.tweens.forEach(tween => tween.stop());
          }
          if (visual.nodes) {
            visual.nodes.forEach(node => {
              if (node && node.destroy) node.destroy();
            });
          }
          this.obstacleVizMap.delete(index);
        }
        this.obstacleRendered[index] = false;
      }

      makeBirdObstacle(obstacle) {
        const startX = obstacle.dir > 0 ? -42 : GAME_WIDTH + 42;
        const endX = obstacle.dir > 0 ? GAME_WIDTH + 42 : -42;
        const bird = this.add.container(startX, obstacle.y).setDepth(8);
        const body = this.add.rectangle(0, 0, 20, 10, 0x2f3440).setStrokeStyle(1, 0x111111);
        const head = this.add.rectangle(obstacle.dir > 0 ? 12 : -12, -2, 8, 8, 0x444b57).setStrokeStyle(1, 0x111111);
        const beak = this.add.triangle(obstacle.dir > 0 ? 19 : -19, -2, 0, 0, obstacle.dir > 0 ? 8 : -8, 4, obstacle.dir > 0 ? 8 : -8, -4, 0xf0b429);
        const wingA = this.add.rectangle(-2, -8, 18, 5, 0x697386).setAngle(obstacle.dir > 0 ? -18 : 18);
        const wingB = this.add.rectangle(-3, 8, 16, 5, 0x697386).setAngle(obstacle.dir > 0 ? 18 : -18);
        const eye = this.add.rectangle(obstacle.dir > 0 ? 14 : -14, -4, 2, 2, 0xffffff);
        bird.add([wingA, wingB, body, head, beak, eye]);

        const distance = Math.abs(endX - startX);
        const moveTween = this.tweens.add({
          targets: bird,
          x: endX,
          duration: (distance / obstacle.speed) * 1000,
          repeat: -1,
          repeatDelay: 700,
          ease: "Linear",
          onRepeat: () => {
            bird.x = startX;
          }
        });
        const flapTween = this.tweens.add({
          targets: [wingA, wingB],
          scaleY: 0.35,
          duration: 120,
          yoyo: true,
          repeat: -1,
          ease: "Sine.easeInOut"
        });

        return {
          type: "bird",
          nodes: [bird],
          tweens: [moveTween, flapTween],
          body: bird,
          radius: 18
        };
      }

      makeDropObstacle(obstacle) {
        const shadow = this.add.ellipse(obstacle.x, obstacle.y + 18, 38, 10, 0x000000, 0.22)
          .setDepth(7)
          .setVisible(false);
        const drop = this.add.container(obstacle.x, obstacle.y - 360).setDepth(9).setVisible(false);
        const main = this.add.rectangle(0, 0, 18, 24, 0x7f8c8d).setStrokeStyle(2, 0x2c3e50);
        const chipA = this.add.rectangle(-5, -7, 6, 5, 0xb0bec5);
        const chipB = this.add.rectangle(5, 6, 7, 4, 0x546e7a);
        const shine = this.add.rectangle(-4, -8, 3, 8, 0xecf0f1, 0.65);
        drop.add([main, chipA, chipB, shine]);

        return {
          type: "drop",
          nodes: [shadow, drop],
          tweens: [],
          shadow,
          body: drop,
          startTime: this.time.now + Phaser.Math.Between(0, 900),
          targetY: obstacle.y,
          radius: 17,
          active: false
        };
      }

      updateObstacleAnimations() {
        this.obstacleVizMap.forEach((visual) => {
          if (visual.type !== "drop") {
            return;
          }

          const elapsed = Phaser.Math.Wrap(this.time.now - visual.startTime, 0, DROP_CYCLE_TIME);
          if (elapsed < DROP_WARNING_TIME) {
            const pulse = 0.2 + Math.sin(this.time.now / 75) * 0.08;
            visual.shadow
              .setAlpha(pulse)
              .setScale(0.75 + elapsed / DROP_WARNING_TIME * 0.45, 1)
              .setVisible(true);
            visual.body.setVisible(false);
            visual.active = false;
            return;
          }

          if (elapsed < DROP_WARNING_TIME + DROP_FALL_TIME) {
            const t = (elapsed - DROP_WARNING_TIME) / DROP_FALL_TIME;
            visual.shadow.setAlpha(0.35).setScale(1.2, 1).setVisible(true);
            visual.body
              .setPosition(visual.body.x, visual.targetY - 350 + 440 * t)
              .setAngle(t * 240)
              .setVisible(true);
            visual.active = true;
            return;
          }

          visual.shadow.setVisible(false);
          visual.body.setVisible(false);
          visual.active = false;
        });
      }

      checkObstacleHits() {
        if (this.catState !== CatState.JUMP && this.catState !== CatState.FALLING) {
          return;
        }

        this.obstacleVizMap.forEach((visual) => {
          if (this.catState === CatState.DEATH) {
            return;
          }
          if (visual.type === "drop" && !visual.active) {
            return;
          }

          const body = visual.body;
          if (!body.visible) {
            return;
          }

          const dx = this.cat.x - body.x;
          const dy = this.cat.y - body.y;
          const hitRadius = visual.radius + 13;
          if (dx * dx + dy * dy <= hitRadius * hitRadius) {
            this.triggerObstacleDeath(visual.type);
          }
        });
      }

      makeGrabPipe(point) {
        const pipe = this.add.rectangle(point.x, point.y, 28, 9, 0x8b5a2b)
          .setStrokeStyle(2, 0x4f331d);
        const boltA = this.add.circle(point.x - 8, point.y, 2, 0xd2b48c);
        const boltB = this.add.circle(point.x + 8, point.y, 2, 0xd2b48c);
        return [pipe, boltA, boltB];
      }

      makeGrabCurtain(point) {
        const rod = this.add.rectangle(point.x, point.y, 24, 5, 0xd4af37)
          .setStrokeStyle(1, 0x8b6f18);
        const ringL = this.add.circle(point.x - 8, point.y, 4, 0xffe58f)
          .setStrokeStyle(1, 0x8b6f18);
        const ringR = this.add.circle(point.x + 8, point.y, 4, 0xffe58f)
          .setStrokeStyle(1, 0x8b6f18);
        return [rod, ringL, ringR];
      }

      makeGrabHook(point) {
        const beam = this.add.rectangle(point.x, point.y - 5, 24, 5, 0x7a4f27)
          .setStrokeStyle(1, 0x4e321b);
        const hook = this.add.rectangle(point.x, point.y, 18, 8, 0xcd853f)
          .setStrokeStyle(2, 0x8b6914);
        const glow = this.add.circle(point.x, point.y - 4, 3, 0xffd4a3, 0.6);
        return [beam, hook, glow];
      }

      makeGrabCrystal(point, color, strokeColor) {
        const crystal = this.add.rectangle(point.x, point.y, 16, 12, color, 0.85)
          .setStrokeStyle(2, strokeColor);
        crystal.setAngle(45);
        const glowA = this.add.circle(point.x - 5, point.y - 3, 2, 0xffffff, 0.5);
        const glowB = this.add.circle(point.x + 5, point.y + 2, 2, 0xffffff, 0.4);
        return [crystal, glowA, glowB];
      }

      // ===================== DEATH / GAME OVER =====================

      triggerObstacleDeath(type) {
        this.deathCause = type === "bird" ? "bird" : "drop";
        this.catState = CatState.DEATH;
        this.cat.setVelocity(0, 0);
        this.cat.body.allowGravity = false;
        this.resetCatScale();
        this.jumpArrow.setVisible(false);
        this.showDeathScreen();
      }

      showDeathScreen() {
        const finalHeight = Math.max(0, Math.round((500 - this.cat.y) / 10));
        const bestH = this.bestHeight;
        const copy = DeathCopy[this.deathCause] || DeathCopy.fall;
        const line = Phaser.Utils.Array.GetRandom(copy.lines);

        this.cameras.main.stopFollow();

        // Dim overlay
        const overlay = this.add.rectangle(GAME_WIDTH / 2, GAME_HEIGHT / 2, GAME_WIDTH, GAME_HEIGHT, 0x000000, 0.7)
          .setScrollFactor(0).setDepth(100);

        // Stats panel
        const panelBg = this.add.rectangle(GAME_WIDTH / 2, GAME_HEIGHT / 2, 292, 260, 0x1a1a2e, 0.9)
          .setScrollFactor(0).setDepth(101)
          .setStrokeStyle(2, 0x4a4a8a);

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 98, copy.title, {
          fontFamily: "monospace",
          fontSize: "26px",
          color: "#ff6666",
          stroke: "#000000",
          strokeThickness: 3
        }).setOrigin(0.5).setScrollFactor(0).setDepth(102);

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 52, line, {
          fontFamily: "monospace",
          fontSize: "15px",
          color: "#ffffff",
          stroke: "#000000",
          strokeThickness: 2,
          align: "center",
          wordWrap: { width: 250, useAdvancedWrap: true }
        }).setOrigin(0.5).setScrollFactor(0).setDepth(102);

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 + 2, `本次攀登: ${finalHeight}m`, {
          fontFamily: "monospace",
          fontSize: "18px",
          color: "#ffffff",
          stroke: "#000000",
          strokeThickness: 2
        }).setOrigin(0.5).setScrollFactor(0).setDepth(102);

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 + 42, `最高纪录: ${bestH}m`, {
          fontFamily: "monospace",
          fontSize: "18px",
          color: "#ffd700",
          stroke: "#000000",
          strokeThickness: 2
        }).setOrigin(0.5).setScrollFactor(0).setDepth(102);

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 + 92, "点击重新开始", {
          fontFamily: "monospace",
          fontSize: "16px",
          color: "#88aaff",
          stroke: "#000000",
          strokeThickness: 2
        }).setOrigin(0.5).setScrollFactor(0).setDepth(102);

        // Restart on click or tap
        this.input.once("pointerdown", () => {
          this.scene.restart();
        });
      }

      // ===================== UPDATE LOOP =====================

      update() {
        if (this.catState === CatState.DEATH) {
          return;
        }

        this.updateRoomVisibility();
        this.updateGrabVisibility();
        this.updateObstacleVisibility();
        this.updateObstacleAnimations();
        this.updateKeyboardCharge();

        if (this.catState === CatState.JUMP && this.cat.body.velocity.y > 50) {
          this.catState = CatState.FALLING;
          this.cat.play("cat-fall");
        }

        if (this.catState === CatState.FALLING || this.catState === CatState.JUMP) {
          this.tryCatch();
          this.checkObstacleHits();
        }

        const FALL_MARGIN = 1500;
        if ((this.catState === CatState.FALLING || this.catState === CatState.JUMP) && this.cat.y > this.lastSafeY + FALL_MARGIN) {
          this.catState = CatState.DEATH;
          this.deathCause = "fall";
          this.showDeathScreen();
          return;
        }

        if (this.catState === CatState.CHARGING) {
          this.updateCharge();
        }

        if (this.catState === CatState.IDLE || this.catState === CatState.CATCHING) {
          this.cat.setAngle(Math.sin(this.time.now / 170) * 2);
        } else {
          this.cat.setAngle(0);
        }

        this.updateJumpArrow();

        if (this.catState === CatState.IDLE || this.catState === CatState.CATCHING) {
          this.lastSafeY = this.cat.y;
        }

        this.bestHeight = Math.max(this.bestHeight, Math.round((500 - this.cat.y) / 10));
        this.heightText.setText(`高度 ${this.bestHeight}m`);

        const catZone = getZoneByY(this.cat.y);
        this.updateAtmosphere(catZone);
      }

      updateAtmosphere(zone) {
        if (this.currentAtmosphereZone === zone) {
          return;
        }
        this.currentAtmosphereZone = zone;
        this.cameras.main.setBackgroundColor(ZONE_CONFIG[zone].bg1);
      }

      handleJump(direction, velocityX = JUMP_VX, velocityY = JUMP_VY) {
        if (this.catState === CatState.DEATH) {
          return;
        }

        if (this.catState === CatState.FALLING && !this.airCatchUsed) {
          this.airCatchUsed = true;
          this.cat.setVelocity(this.cat.body.velocity.x * 0.55, -300);
          this.cat.play("cat-air-catch");
          return;
        }

        if (
          this.catState !== CatState.IDLE &&
          this.catState !== CatState.CATCHING &&
          this.catState !== CatState.CHARGING
        ) {
          return;
        }

        this.releasedGrab = this.currentGrab;
        this.currentGrab = null;
        this.skipCatchIndex = -1;
        this.catState = CatState.JUMP;
        this.airCatchUsed = false;
        this.jumpArrow.setVisible(false);
        this.resetCatScale();
        this.cat.body.allowGravity = true;
        this.cat.setVelocity(direction * velocityX, velocityY);
        this.cat.play(direction < 0 ? "cat-jump-left" : "cat-jump-right");
      }

      handleChargedJump() {
        if (this.catState === CatState.DEATH) {
          return;
        }

        if (!this.currentGrab || this.currentGrab.index + 2 >= this.grabPoints.length) {
          this.handleJump(this.chargeDirection, CHARGE_JUMP_VX, CHARGE_JUMP_VY);
          return;
        }

        const target = this.grabPoints[this.currentGrab.index + 2];
        const released = this.currentGrab;
        const dy = target.y - this.cat.y;
        const disc = CHARGE_JUMP_VY * CHARGE_JUMP_VY + 2 * GRAVITY * dy;
        const flightTime = disc > 0 ? (-CHARGE_JUMP_VY + Math.sqrt(disc)) / GRAVITY : 0;

        if (flightTime <= 0) {
          this.handleJump(this.chargeDirection, CHARGE_JUMP_VX, CHARGE_JUMP_VY);
          return;
        }

        const direction = this.chargeDirection;
        const velocityX = direction * CHARGE_JUMP_VX;

        this.releasedGrab = released;
        this.currentGrab = null;
        this.skipCatchIndex = released.index + 1;
        this.catState = CatState.JUMP;
        this.airCatchUsed = false;
        this.jumpArrow.setVisible(false);
        this.resetCatScale();
        this.cat.body.allowGravity = true;
        this.cat.setVelocity(velocityX, CHARGE_JUMP_VY);
        this.cat.play(direction < 0 ? "cat-jump-left" : "cat-jump-right");
      }

      handleCatRelativeJump(pointer, inputType = "pointer") {
        const direction = pointer.x < this.cat.x ? -1 : 1;
        this.startChargeJump(direction, inputType);
      }

      updateJumpArrow() {
        if (this.catState !== CatState.CHARGING) {
          this.jumpArrow.setVisible(false);
          return;
        }

        const isLeft = this.chargeDirection < 0;
        this.jumpArrow
          .setText(isLeft ? "◀" : "▶")
          .setPosition(this.cat.x + (isLeft ? -30 : 30), this.cat.y - 10)
          .setAlpha(0.7 + Math.sin(this.time.now / 110) * 0.3)
          .setVisible(true);
      }

      startChargeJump(direction, inputType) {
        if (this.catState !== CatState.IDLE && this.catState !== CatState.CATCHING) {
          return;
        }

        this.catState = CatState.CHARGING;
        this.chargeStart = this.time.now;
        this.chargeDirection = direction;
        this.chargeInput = inputType;
        this.cat.setVelocity(0, 0);
        this.cat.body.allowGravity = false;
        this.cat.setAngle(0);
        this.updateJumpArrow();
        this.updateCharge();
      }

      updateCharge() {
        const chargeTime = this.time.now - this.chargeStart;
        const t = Phaser.Math.Clamp(chargeTime / MAX_CHARGE, 0, 1);
        const squash = Phaser.Math.Linear(1, 0.7, t);
        const stretch = Phaser.Math.Linear(1, 1.15, t);

        this.cat.setScale(this.catBaseScaleX * stretch, this.catBaseScaleY * squash);
        if (t < 0.1) {
          this.cat.play("cat-hang");
        } else if (t < 0.4) {
          this.cat.play("cat-charge0");
        } else if (t < 0.7) {
          this.cat.play("cat-charge1");
        } else {
          this.cat.play("cat-charge2");
        }

      }

      releaseChargeJump() {
        if (this.catState !== CatState.CHARGING) {
          return;
        }

        const chargeTime = this.time.now - this.chargeStart;
        const isCharged = chargeTime >= MAX_CHARGE;
        const direction = this.chargeDirection;

        this.chargeStart = 0;
        this.chargeInput = null;
        this.keyboardChargeDirection = 0;

        if (isCharged) {
          this.handleChargedJump();
        } else {
          this.handleJump(direction, JUMP_VX, JUMP_VY);
        }
      }

      updateKeyboardCharge() {
        const leftDown = this.keys.left.isDown || this.keys.arrowLeft.isDown;
        const rightDown = this.keys.right.isDown || this.keys.arrowRight.isDown;

        if (this.catState === CatState.CHARGING && this.chargeInput === "keyboard") {
          if (
            (this.keyboardChargeDirection < 0 && !leftDown) ||
            (this.keyboardChargeDirection > 0 && !rightDown)
          ) {
            this.releaseChargeJump();
          }
          return;
        }

        if (this.catState !== CatState.IDLE && this.catState !== CatState.CATCHING) {
          return;
        }

        if (leftDown) {
          this.keyboardChargeDirection = -1;
          this.startChargeJump(-1, "keyboard");
        } else if (rightDown) {
          this.keyboardChargeDirection = 1;
          this.startChargeJump(1, "keyboard");
        }
      }

      resetCatScale() {
        this.cat.setScale(this.catBaseScaleX, this.catBaseScaleY);
      }

      tryCatch() {
        if (this.cat.body.velocity.y >= MAX_FALL_SPEED) {
          return;
        }

        const catY = this.cat.y;

        // Binary search for points near cat's Y position
        let lo = 0;
        let hi = this.grabPoints.length;
        while (lo < hi) {
          const mid = (lo + hi) >> 1;
          if (this.grabPoints[mid].y <= catY + CATCH_RADIUS) {
            hi = mid;
          } else {
            lo = mid + 1;
          }
        }

        // Only check a window of 60 points around the cat's position
        const from = Math.max(0, lo - 30);
        const to = Math.min(this.grabPoints.length - 1, lo + 30);

        let closest = null;
        let closestDistance = Infinity;
        for (let i = from; i <= to; i++) {
          const point = this.grabPoints[i];
          if (point === this.currentGrab || point === this.releasedGrab || point.index === this.skipCatchIndex) {
            continue;
          }
          const dx = this.cat.x - point.x;
          const dy = this.cat.y - point.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          if (distance <= CATCH_RADIUS && distance < closestDistance) {
            closest = point;
            closestDistance = distance;
          }
        }

        if (closest) {
          this.catchPoint(closest);
        }
      }

      catchPoint(point) {
        this.currentGrab = point;
        this.releasedGrab = null;
        this.skipCatchIndex = -1;
        this.catState = CatState.CATCHING;
        this.cat.setPosition(point.x, point.y + 9);
        this.cat.setVelocity(0, 0);
        this.resetCatScale();
        this.cat.body.allowGravity = false;
        this.cat.play("cat-hang");
        this.time.delayedCall(90, () => {
          if (this.catState === CatState.CATCHING) {
            this.catState = CatState.IDLE;
          }
        });
      }
    }

    window.catClimbGame = new Phaser.Game({
      type: Phaser.AUTO,
      parent: "game",
      width: GAME_WIDTH,
      height: GAME_HEIGHT,
      backgroundColor: ROOM_DARK_CSS,
      pixelArt: true,
      physics: {
        default: "arcade",
        arcade: {
          gravity: { y: GRAVITY },
          debug: false
        }
      },
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
      },
      scene: GameScene
    });
  </script>
</body>
</html>
